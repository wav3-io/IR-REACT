<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IR Navigator — PICERL</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── THEME TOKENS ── */
    :root[data-theme="dark"] {
      --bg:          #0e0e18;
      --bg2:         #141424;
      --bg3:         #1a1a2e;
      --surface:     #1e1e32;
      --surface2:    #252540;
      --border:      #2e2e50;
      --border2:     #3a3a60;
      --text:        #e8e8f0;
      --text2:       #a0a0c0;
      --text3:       #666688;
      --text4:       #444460;
      --accent:      #7c6ff7;
      --accent2:     #a29bfe;
      --danger:      #e94560;
      --header-bg:   #111120;
      --modal-bg:    #141428;
      --modal-border:#2e2e5e;
      --input-bg:    #0c0c1e;
      --input-border:#252545;
      --scrollbar:   #2e2e50;
      --cell-bg:     #161628;
      --cell-border: #252545;
      --dim-opacity: 0.18;
      --shadow-sm:   0 2px 8px rgba(0,0,0,.4);
      --shadow-md:   0 4px 20px rgba(0,0,0,.5);
    }
    :root[data-theme="light"] {
      --bg:          #f0f0f8;
      --bg2:         #e8e8f4;
      --bg3:         #dfe0ef;
      --surface:     #ffffff;
      --surface2:    #f5f5fc;
      --border:      #c8c8e0;
      --border2:     #b0b0d0;
      --text:        #1a1a2e;
      --text2:       #4a4a6a;
      --text3:       #7070a0;
      --text4:       #a0a0c0;
      --accent:      #5b4fd4;
      --accent2:     #7c6ff7;
      --danger:      #d63050;
      --header-bg:   #ffffff;
      --modal-bg:    #ffffff;
      --modal-border:#c8c8e0;
      --input-bg:    #f5f5fc;
      --input-border:#c0c0da;
      --scrollbar:   #c0c0da;
      --cell-bg:     #ffffff;
      --cell-border: #d0d0e8;
      --dim-opacity: 0.22;
      --shadow-sm:   0 2px 8px rgba(0,0,0,.08);
      --shadow-md:   0 4px 20px rgba(0,0,0,.12);
    }
    :root[data-theme="tactical"] {
      --bg:          #1a0a0c;
      --bg2:         #220e10;
      --bg3:         #2a1214;
      --surface:     #2e1416;
      --surface2:    #381a1c;
      --border:      #5a2228;
      --border2:     #6e2a32;
      --text:        #ffffff;
      --text2:       #f0d0b0;
      --text3:       #a06050;
      --text4:       #703838;
      --accent:      #D41C2C;
      --accent2:     #FCCC44;
      --danger:      #D41C2C;
      --header-bg:   #160808;
      --modal-bg:    #1e0c0e;
      --modal-border:#5a2228;
      --input-bg:    #140808;
      --input-border:#4a1e22;
      --scrollbar:   #5a2228;
      --cell-bg:     #1e0e10;
      --cell-border: #4a1e22;
      --dim-opacity: 0.15;
      --shadow-sm:   0 2px 8px rgba(212,28,44,.2);
      --shadow-md:   0 4px 20px rgba(212,28,44,.25);
    }
    :root[data-theme="midnight"] {
      --bg:          #0a1628;
      --bg2:         #0e1e32;
      --bg3:         #12263c;
      --surface:     #162e48;
      --surface2:    #1a3650;
      --border:      #244a6a;
      --border2:     #2e5a7a;
      --text:        #e0f0ff;
      --text2:       #90b8d8;
      --text3:       #506878;
      --text4:       #304858;
      --accent:      #3b9eff;
      --accent2:     #6bb8ff;
      --danger:      #ff5070;
      --header-bg:   #081220;
      --modal-bg:    #0e1a2e;
      --modal-border:#244a6a;
      --input-bg:    #081424;
      --input-border:#1e3a58;
      --scrollbar:   #244a6a;
      --cell-bg:     #0e1828;
      --cell-border: #1e3a58;
      --dim-opacity: 0.18;
      --shadow-sm:   0 2px 8px rgba(0,0,0,.4);
      --shadow-md:   0 4px 20px rgba(0,0,0,.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: var(--bg); font-family: 'DM Mono', monospace; color: var(--text); overflow: hidden; transition: background .25s, color .25s; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* Action cells */
    .tech-cell { transition: transform .12s ease, box-shadow .12s ease, opacity .2s ease !important; }
    .tech-cell:hover { transform: translateY(-2px) !important; }
    .tech-cell.dimmed { opacity: var(--dim-opacity) !important; }
    .tech-cell.dimmed.view-mode-dim { pointer-events: none; }
    .tech-cell.in-playbook { outline: 2px solid var(--pb-color,#7c6ff7) !important; outline-offset: 2px; }
    .tech-cell.in-playbook.view-mode { cursor: pointer !important; }
    .tech-cell.edit-mode-cell { cursor: crosshair !important; }

    .tactic-del { opacity: 0 !important; transition: opacity .18s !important; }
    .tactic-wrap:hover .tactic-del { opacity: 1 !important; }
    .tactic-header { transition: filter .15s !important; cursor: pointer; }
    .tactic-header:hover { filter: brightness(1.15) !important; }

    .tool-btn { transition: all .15s !important; }
    .tool-btn:hover { background: var(--surface2) !important; border-color: var(--accent) !important; color: var(--accent2) !important; }

    .cat-pill-wrap { transition: opacity .15s; }
    .add-action-btn { transition: border-color .15s, color .15s; }

    /* Playbook panel */
    .pb-card { transition: border-color .18s ease, background .18s ease; }
    .pb-tech-row { transition: background .12s; border-radius: 4px; }
    .pb-tech-row:hover { background: var(--surface2) !important; }
    .pb-tech-row.clickable:hover { background: var(--surface) !important; cursor: pointer; }
    .mode-btn { transition: all .15s; }

    /* Drag and drop */
    .drag-row { user-select: none; border-top: 2px solid transparent; border-bottom: 2px solid transparent; transition: border-color .1s, opacity .15s; border-radius: 4px; }
    .drag-row.dragging { opacity: 0.25; }
    .drag-row.drop-above { border-top-color: var(--drop-color,#7c6ff7) !important; }
    .drag-row.drop-below { border-bottom-color: var(--drop-color,#7c6ff7) !important; }
    .drag-handle { cursor: grab; opacity: 0; transition: opacity .15s; flex-shrink: 0; display: flex; align-items: center; padding: 0 2px; }
    .drag-row:hover .drag-handle { opacity: 0.45; }
    .drag-handle:hover { opacity: 1 !important; }
    .drag-handle:active { cursor: grabbing; }

    /* Theme toggle */
    .theme-toggle { transition: all .2s; }
    .theme-toggle:hover { transform: scale(1.1); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(6px); }
    /* Details/summary chevron rotate on open */
    details[open] summary svg { transform: rotate(90deg) !important; }
    details summary::-webkit-details-marker { display: none; }
    details summary { outline: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .rec-dot { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn .2s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>


<script type="text/babel">
const { useState, useRef, useEffect } = React;

// Data is loaded from the GitHub folder structure via loadData() below

const PB_COLORS = ["#e94560","#f6ad55","#68d391","#63b3ed","#b794f4","#81e6d9","#fc8181","#a29bfe","#fbd38d","#90cdf4"];

// Dark-mode category colors (rich, saturated)
const DEFAULT_CATEGORIES = [
  { id:"",               label:"Uncategorized",  color:"#3a3a60", bg:"#1e1e38", text:"#8080b0"  },
  { id:"general",       label:"General",         color:"#5a6478", bg:"#2a303e", text:"#a0b0c8"  },
  { id:"network",       label:"Network",         color:"#2b6cb0", bg:"#1a365d", text:"#63b3ed"  },
  { id:"email",         label:"Email",           color:"#6b46c1", bg:"#2d1f5e", text:"#b794f4"  },
  { id:"file",          label:"File",            color:"#b7791f", bg:"#4a2e08", text:"#f6ad55"  },
  { id:"process",       label:"Process",         color:"#276749", bg:"#143325", text:"#68d391"  },
  { id:"configuration", label:"Configuration",   color:"#2c7a7b", bg:"#163838", text:"#81e6d9"  },
  { id:"identity",      label:"Identity",        color:"#c53030", bg:"#4a1010", text:"#fc8181"  },
];

const TACTIC_ACCENTS_DARK = {
  t1:{ from:"#0f2744", to:"#0a1828", border:"#1e4a7a", text:"#63b3ed" },
  t2:{ from:"#1f1040", to:"#130a28", border:"#4a2a8c", text:"#b794f4" },
  t3:{ from:"#3a1a08", to:"#220e03", border:"#7a3a10", text:"#f6ad55" },
  t4:{ from:"#0f2a1a", to:"#081a0f", border:"#1e5a30", text:"#68d391" },
  t5:{ from:"#0a1f30", to:"#050f1c", border:"#1a3f5c", text:"#90cdf4" },
  t6:{ from:"#2a0f18", to:"#18080e", border:"#5c1f30", text:"#fc8181" },
};
const TACTIC_ACCENTS_LIGHT = {
  t1:{ from:"#dbeafe", to:"#eff6ff", border:"#93c5fd", text:"#1d4ed8" },
  t2:{ from:"#ede9fe", to:"#f5f3ff", border:"#a78bfa", text:"#5b21b6" },
  t3:{ from:"#ffedd5", to:"#fff7ed", border:"#fdba74", text:"#c2410c" },
  t4:{ from:"#dcfce7", to:"#f0fdf4", border:"#86efac", text:"#15803d" },
  t5:{ from:"#e0f2fe", to:"#f0f9ff", border:"#7dd3fc", text:"#0369a1" },
  t6:{ from:"#ffe4e6", to:"#fff1f2", border:"#fda4af", text:"#be123c" },
};
const DEF_ACCENT_DARK  = { from:"#1e1e4f", to:"#12122a", border:"#3e2e7e", text:"#c4b5fd" };
const DEF_ACCENT_LIGHT = { from:"#ede9fe", to:"#f5f3ff", border:"#a78bfa", text:"#5b21b6" };

function uid() { return Math.random().toString(36).slice(2,8); }
function openLink(url) { if(url) window.open(url,"_blank","noopener,noreferrer"); }
function dateStamp() {
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
function exportHTML(matrix, name) {
  // In the GitHub Pages version we export a JSON snapshot instead of an HTML file
  const data = JSON.stringify({...matrix, name}, null, 2);
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download = `ir-navigator-snapshot_${dateStamp()}.json`;
  a.click();
}

// ── Theme-aware shared styles (functions so they re-derive on theme change) ──
function getS(dark) {
  return {
    primary: { background:"linear-gradient(135deg,#6c5ce7,#a29bfe)",color:"#fff",border:"none",borderRadius:7,padding:"8px 20px",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace",letterSpacing:.5 },
    ghost:   { background:"transparent",color:dark?"#888":"#555",border:`1px solid ${dark?"#3a3a60":"#c0c0da"}`,borderRadius:7,padding:"8px 20px",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace" },
    input:   { width:"100%",background:dark?"#0c0c1e":"#f5f5fc",border:`1px solid ${dark?"#252545":"#c0c0da"}`,borderRadius:6,color:dark?"#e8e8f0":"#1a1a2e",padding:"8px 10px",fontSize:13,fontFamily:"'DM Mono',monospace",boxSizing:"border-box",outline:"none",display:"block" },
    mbox:    { background:dark?"#141428":"#ffffff",border:`1px solid ${dark?"#2e2e5e":"#c8c8e0"}`,borderRadius:14,padding:32,width:460,maxWidth:"92vw",fontFamily:"'DM Mono',monospace",boxShadow:dark?"0 24px 60px rgba(0,0,0,.6)":"0 24px 60px rgba(0,0,0,.15)" },
    ml:      { fontSize:10,color:dark?"#555":"#a0a0c0",letterSpacing:3,textTransform:"uppercase",marginBottom:10 },
    ml2:     { fontSize:10,color:dark?"#666":"#9090b0",letterSpacing:2,marginBottom:6 },
    note:    { fontSize:10,color:dark?"#444":"#b0b0cc",marginBottom:16 },
    select:  { width:"100%",marginBottom:14,background:dark?"#0c0c1e":"#f5f5fc",border:`1px solid ${dark?"#252545":"#c0c0da"}`,borderRadius:6,color:dark?"#e8e8f0":"#1a1a2e",padding:"8px 10px",fontSize:13,fontFamily:"inherit",outline:"none" },
  };
}

// ── SectionBlock — collapsible section with copy-to-clipboard button ──
function SectionBlock({sec, dark}) {
  const [copied, setCopied] = useState(false);

  function handleCopy(e) {
    e.stopPropagation();
    if(!sec.body) return;
    navigator.clipboard.writeText(sec.body).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 1800);
    }).catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = sec.body;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(()=>setCopied(false), 1800);
    });
  }

  return (
    <details style={{marginBottom:3}}>
      <summary style={{fontSize:9,color:dark?"#7c6ff7":"#5b4fd4",cursor:"pointer",letterSpacing:.5,listStyle:"none",display:"flex",alignItems:"center",gap:4,userSelect:"none",padding:"2px 0"}}>
        <svg width="7" height="7" viewBox="0 0 10 10" fill={dark?"#7c6ff7":"#5b4fd4"} style={{flexShrink:0,transition:"transform .15s"}}><polygon points="0,0 10,5 0,10"/></svg>
        {sec.title||"Notes"}
        {sec.url&&(
          <a href={sec.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
            title={sec.url}
            style={{display:"inline-flex",alignItems:"center",marginLeft:2,opacity:.5,transition:"opacity .15s"}}
            onMouseEnter={e=>e.currentTarget.style.opacity=1}
            onMouseLeave={e=>e.currentTarget.style.opacity=.5}>
            <LinkIcon color={dark?"#63b3ed":"#2b6cb0"} size={8}/>
          </a>
        )}
      </summary>
      <div style={{marginTop:4,position:"relative",borderRadius:5,border:`1px solid ${dark?"#1e1e3a":"#e0e0f0"}`,overflow:"hidden"}}>
        {sec.body&&(
          <button
            onClick={handleCopy}
            title={copied?"Copied!":"Copy to clipboard"}
            style={{
              position:"absolute",top:5,right:5,
              background:copied?(dark?"#1a3a1a":"#e6f7e6"):(dark?"#1a1a3a":"#ede9fe"),
              border:`1px solid ${copied?(dark?"#276749":"#86efac"):(dark?"#3a3a6a":"#c4b5fd")}`,
              borderRadius:4,padding:"2px 6px",cursor:"pointer",
              fontSize:9,fontFamily:"inherit",
              color:copied?(dark?"#68d391":"#15803d"):(dark?"#a29bfe":"#5b4fd4"),
              display:"flex",alignItems:"center",gap:3,
              transition:"all .2s",zIndex:1,
            }}>
            {copied
              ? <><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied</>
              : <><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2 2v1"/></svg> Copy</>
            }
          </button>
        )}
        <div style={{padding:"6px 8px",paddingRight:sec.body?"52px":"8px",background:dark?"#0c0c1e88":"#f0f0f888",fontSize:10,color:dark?"#a0a0c0":"#5050a0",lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",minHeight:28}}>
          {sec.body?sec.body:<span style={{opacity:.4,fontStyle:"italic"}}>empty</span>}
        </div>
      </div>
    </details>
  );
}

// ── Icons ──
function LinkIcon({color="#555",size=11}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
}
function BookIcon({color="#888",size=13}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
}
function PlusIcon({color="#888",size=11}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;

}
function EyeIcon({color="#888",size=11}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
}
function ChevronIcon({color="#555",size=10,up=false}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform:up?"rotate(180deg)":"none",transition:"transform .2s"}}><polyline points="6 9 12 15 18 9"/></svg>;
}
function GripIcon({color="#888"}) {
  return <svg width="10" height="14" viewBox="0 0 10 14" fill="none">
    <circle cx="3" cy="3"  r="1.3" fill={color}/>
    <circle cx="7" cy="3"  r="1.3" fill={color}/>
    <circle cx="3" cy="7"  r="1.3" fill={color}/>
    <circle cx="7" cy="7"  r="1.3" fill={color}/>
    <circle cx="3" cy="11" r="1.3" fill={color}/>
    <circle cx="7" cy="11" r="1.3" fill={color}/>
  </svg>;
}
function SunIcon({color="#888",size=15}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
}
function MoonIcon({color="#888",size=15}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
}
function TagIcon({color="#888",size=12}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>;
}
function GuideIcon({color="#888",size=11}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
}

// ── Modals ──
function TacticEditModal({dark, onClose, tactic, onSave}) {
  const S = getS(dark);
  const [name,setName] = useState(tactic.name);
  const [url,setUrl]   = useState(tactic.url||"");
  return (
    <div className="modal-overlay">
      <div style={S.mbox}>
        <div style={S.ml}>Edit Phase</div>

function CellModal({dark, tech, onClose, onSave, categories}) {
  const S = getS(dark);
  const [category,setCategory]       = useState(tech.category||"");
  const [url,setUrl]                 = useState(tech.url||"");
  const [description,setDescription] = useState(tech.description||"");
  const [editName,setEditName]       = useState(tech.name||"");
  const getCat = id => categories.find(c=>c.id===id)||categories[0];
  const cat = getCat(category);

  // Sections: migrate legacy `comment` string to sections array
  function initSections() {
    if(tech.sections && tech.sections.length > 0) return tech.sections.map(s=>({...s}));
    if(tech.comment) return [{id:uid(), title:"Notes", body:tech.comment}];
    return [];
  }
  const [sections, setSections] = useState(initSections);

  function addSection()                    { setSections(s=>[...s, {id:uid(), title:"Notes", body:"", url:""}]); }
  function removeSection(id)               { setSections(s=>s.filter(x=>x.id!==id)); }
  function updateSection(id, field, value) { setSections(s=>s.map(x=>x.id!==id?x:{...x,[field]:value})); }

  const inputBg     = dark?"#0c0c1e":"#f5f5fc";
  const inputBorder = dark?"#252545":"#c0c0da";
  const textColor   = dark?"#ccc":"#333";
  const dimColor    = dark?"#444":"#b0b0cc";

  return (
    <div className="modal-overlay">
      <div style={{...S.mbox,border:`1px solid ${cat.id?cat.color:dark?"#2e2e5e":"#c8c8e0"}`,boxShadow:cat.id?`0 0 40px ${cat.color}28`:dark?"0 24px 60px rgba(0,0,0,.6)":"0 24px 60px rgba(0,0,0,.15)",width:520,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={S.ml}>Edit Action</div>
        <div style={S.ml2}>NAME</div>
        <input value={editName} onChange={e=>setEditName(e.target.value)} style={{...S.input,marginBottom:10,fontSize:14,fontWeight:600}}/>
        <div style={S.ml2}>DESCRIPTION</div>
        <textarea value={description} onChange={e=>setDescription(e.target.value)} rows={2} placeholder="Short description of this action…"
          style={{width:"100%",background:inputBg,border:`1px solid ${inputBorder}`,borderRadius:6,color:textColor,padding:"8px 10px",fontSize:12,fontStyle:"italic",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",outline:"none",display:"block",lineHeight:1.5,marginBottom:10}}/>
        <div style={{color:dimColor,fontSize:12,marginBottom:20}}>{tech.id}</div>
        <div style={{display:"inline-flex",alignItems:"center",gap:7,background:cat.bg,border:`1px solid ${cat.color}`,borderRadius:20,padding:"5px 14px",marginBottom:20}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:cat.text}}/>
          <span style={{color:cat.text,fontSize:12}}>{cat.label}</span>
        </div>
        <div style={S.ml2}>CATEGORY</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:20}}>
          {categories.map(c=>(
            <button key={c.id} onClick={()=>setCategory(c.id)} style={{background:category===c.id?c.bg:dark?"#0c0c1e":"#f0f0f8",border:`1px solid ${category===c.id?c.color:dark?"#252545":"#d0d0e8"}`,borderRadius:8,padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,transition:"all .15s",fontFamily:"inherit",textAlign:"left"}}>
              <div style={{width:9,height:9,borderRadius:"50%",flexShrink:0,background:category===c.id?c.text:dark?"#333":"#ccc"}}/>
              <span style={{color:category===c.id?c.text:dark?"#666":"#888",fontSize:12}}>{c.label}</span>
            </button>
          ))}
        </div>
        <div style={S.ml2}>REFERENCE URL</div>
        <div style={{position:"relative",marginBottom:4}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)"}}><LinkIcon color={dark?"#555":"#aaa"} size={12}/></span>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://wiki.example.com/action" style={{...S.input,paddingLeft:28}}/>
        </div>
        <div style={{...S.note,marginBottom:20}}>Clicking this cell will open this URL in a new tab.</div>

        {/* ── SECTIONS ── */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={S.ml2}>DETAIL SECTIONS</div>
          <button onClick={addSection} style={{display:"flex",alignItems:"center",gap:4,background:"transparent",border:`1px dashed ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:6,padding:"3px 10px",cursor:"pointer",color:dark?"#7c6ff7":"#5b4fd4",fontSize:11,fontFamily:"inherit",transition:"all .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background=dark?"#1a1a3a":"#ede9fe"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <PlusIcon color={dark?"#7c6ff7":"#5b4fd4"} size={9}/>
            Add section
          </button>
        </div>

        {sections.length===0 && (
          <div style={{textAlign:"center",border:`1px dashed ${dark?"#252545":"#d8d8f0"}`,borderRadius:8,padding:"16px",color:dimColor,fontSize:11,marginBottom:8}}>
            No sections yet — click "Add section" to create one.<br/>
            <span style={{opacity:.6}}>Each section becomes a collapsible panel on the action card.</span>
          </div>
        )}

        {sections.map((sec,i)=>(
          <div key={sec.id} style={{marginBottom:10,border:`1px solid ${dark?"#252545":"#d8d8f0"}`,borderRadius:8,overflow:"hidden"}}>
            {/* Section header */}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:dark?"#0e0e1e":"#f8f8ff",borderBottom:`1px solid ${dark?"#1e1e35":"#e8e8f8"}`}}>
              <span style={{fontSize:10,color:dimColor,flexShrink:0}}>#{i+1}</span>
              <input
                value={sec.title}
                onChange={e=>updateSection(sec.id,"title",e.target.value)}
                placeholder="Section title (e.g. Procedure, Tools, References…)"
                style={{flex:1,background:"transparent",border:"none",outline:"none",fontFamily:"inherit",fontSize:12,fontWeight:600,color:dark?"#ccc":"#333"}}
              />
              <button onClick={()=>updateSection(sec.id,"_showUrl",!sec._showUrl)}
                title={sec.url?"Edit section link":"Add section link"}
                onMouseEnter={e=>e.currentTarget.style.opacity=1}
                onMouseLeave={e=>e.currentTarget.style.opacity=sec.url?.8:.35}
                style={{background:"transparent",border:"none",cursor:"pointer",padding:"0 2px",flexShrink:0,opacity:sec.url?.8:.35,transition:"opacity .15s",display:"flex",alignItems:"center"}}>
                <LinkIcon color={sec.url?(dark?"#63b3ed":"#2b6cb0"):(dark?"#666":"#aaa")} size={11}/>
              </button>
              <button onClick={()=>removeSection(sec.id)}
                onMouseEnter={e=>e.currentTarget.style.color="#e94560"}
                onMouseLeave={e=>e.currentTarget.style.color=dark?"#e9456055":"#e9456033"}
                style={{background:"transparent",border:"none",color:dark?"#e9456055":"#e9456033",cursor:"pointer",fontSize:15,lineHeight:1,padding:"0 2px",transition:"color .15s",flexShrink:0}}>×</button>
            </div>
            {/* Section URL input (toggled) */}
            {sec._showUrl&&(
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:dark?"#0a0a18":"#f0f0fa",borderBottom:`1px solid ${dark?"#1e1e35":"#e8e8f8"}`}}>
                <LinkIcon color={dark?"#555":"#aaa"} size={10}/>
                <input
                  value={sec.url||""}
                  onChange={e=>updateSection(sec.id,"url",e.target.value)}
                  placeholder="https://wiki.example.com/section-reference"
                  style={{flex:1,background:"transparent",border:"none",outline:"none",fontFamily:"inherit",fontSize:11,color:dark?"#90b0d0":"#4060a0"}}
                />
                {sec.url&&(
                  <button onClick={()=>updateSection(sec.id,"url","")}
                    style={{background:"transparent",border:"none",color:dark?"#e9456055":"#e9456033",cursor:"pointer",fontSize:12,lineHeight:1,padding:"0 2px"}}>×</button>
                )}
              </div>
            )}
            {/* Section body */}
            <textarea
              value={sec.body}
              onChange={e=>updateSection(sec.id,"body",e.target.value)}
              rows={4}
              placeholder="Write detail here — supports plain text or markdown…"
              style={{width:"100%",background:inputBg,border:"none",color:textColor,padding:"10px 12px",fontSize:12,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",outline:"none",display:"block",lineHeight:1.6}}
              onFocus={e=>e.target.parentElement.style.borderColor="#7c6ff7"}
              onBlur={e=>e.target.parentElement.style.borderColor=dark?"#252545":"#d8d8f0"}
            />
          </div>
        ))}

        <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={S.ghost}>Cancel</button>
          <button onClick={()=>onSave({name:editName.trim()||tech.name, description:description.trim(), category, sections:sections.map(s=>{const {_showUrl,...rest}=s; return rest;}), url:url.trim()})} style={S.primary}>Save</button>
        </div>
      </div>
    </div>
  );
}

const CAT_PRESETS = [
  {color:"#2b6cb0",bg:"#1a365d",text:"#63b3ed"},
  {color:"#6b46c1",bg:"#2d1f5e",text:"#b794f4"},
