// ── Live UTC clock + incident elapsed timer ──
function ClockBar({ startMs, compact }) {
  const [utcTime, setUtcTime] = React.useState('');
  const [elapsed, setElapsed] = React.useState('––:––:––');
  React.useEffect(() => {
    function tick() {
      const now = new Date();
      const p = n => String(n).padStart(2,'0');
      setUtcTime(p(now.getUTCHours())+':'+p(now.getUTCMinutes())+':'+p(now.getUTCSeconds())+' UTC');
      if (startMs) {
        const diff = Math.max(0, Math.floor((Date.now() - startMs) / 1000));
        setElapsed(p(Math.floor(diff/3600))+':'+p(Math.floor((diff%3600)/60))+':'+p(diff%60));
      } else {
        setElapsed('––:––:––');
      }
    }
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [startMs]);
  return (
    <div style={{
      display:'flex', alignItems:'center', gap: compact?10:20,
      background:'rgba(0,0,0,0.18)',
      border:'1px solid rgba(255,255,255,0.12)',
      borderRadius: compact?6:8,
      padding: compact?'3px 12px':'5px 18px',
      fontFamily:"'DM Mono',monospace",
      flexShrink:0,
    }}>
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        <span style={{fontSize:compact?8:9,color:'rgba(255,255,255,0.45)',letterSpacing:1.5,textTransform:'uppercase'}}>ELAPSED</span>
        <span style={{fontSize:compact?12:15,color:'#f0c040',fontWeight:600,letterSpacing:2,fontVariantNumeric:'tabular-nums',textShadow:'0 0 8px rgba(240,192,64,0.4)'}}>{elapsed}</span>
        {startMs && <span style={{width:6,height:6,borderRadius:'50%',background:'#ef4444',flexShrink:0,display:'inline-block'}} className="rec-dot"/>}
      </div>
      <div style={{width:1,height:compact?16:22,background:'rgba(255,255,255,0.15)',flexShrink:0}}/>
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        <span style={{fontSize:compact?8:9,color:'rgba(255,255,255,0.45)',letterSpacing:1.5,textTransform:'uppercase'}}>UTC</span>
        <span style={{fontSize:compact?12:15,color:'rgba(255,255,255,0.9)',fontWeight:600,letterSpacing:2,fontVariantNumeric:'tabular-nums'}}>{utcTime}</span>
      </div>
    </div>
  );
}

function uid() { return Math.random().toString(36).slice(2,8); }
function openLink(url) { if(url) window.open(url,"_blank","noopener,noreferrer"); }
function dateStamp() {
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
function exportHTML(matrix, name) {
  // In the GitHub Pages version we export a JSON snapshot instead of an HTML file
  const data = JSON.stringify({...matrix, name}, null, 2);
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download = `ir-navigator-snapshot_${dateStamp()}.json`;
  a.click();
}

// ── SectionBlock — collapsible section with copy-to-clipboard button ──
function SectionBlock({sec, dark}) {
  const [copied, setCopied] = useState(false);

  function handleCopy(e) {
    e.stopPropagation();
    if(!sec.body) return;
    navigator.clipboard.writeText(sec.body).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 1800);
    }).catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = sec.body;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(()=>setCopied(false), 1800);
    });
  }

  return (
    <details style={{marginBottom:3}}>
      <summary style={{fontSize:9,color:dark?"#7c6ff7":"#5b4fd4",cursor:"pointer",letterSpacing:.5,listStyle:"none",display:"flex",alignItems:"center",gap:4,userSelect:"none",padding:"2px 0"}}>
        <svg width="7" height="7" viewBox="0 0 10 10" fill={dark?"#7c6ff7":"#5b4fd4"} style={{flexShrink:0,transition:"transform .15s"}}><polygon points="0,0 10,5 0,10"/></svg>
        {sec.title||"Notes"}
        {sec.url&&(
          <a href={sec.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
            title={sec.url}
            style={{display:"inline-flex",alignItems:"center",marginLeft:2,opacity:.5,transition:"opacity .15s"}}
            onMouseEnter={e=>e.currentTarget.style.opacity=1}
            onMouseLeave={e=>e.currentTarget.style.opacity=.5}>
            <LinkIcon color={dark?"#63b3ed":"#2b6cb0"} size={8}/>
          </a>
        )}
      </summary>
      <div style={{marginTop:4,position:"relative",borderRadius:5,border:`1px solid ${dark?"#1e1e3a":"#e0e0f0"}`,overflow:"hidden"}}>
        {sec.body&&(
          <button
            onClick={handleCopy}
            title={copied?"Copied!":"Copy to clipboard"}
            style={{
              position:"absolute",top:5,right:5,
              background:copied?(dark?"#1a3a1a":"#e6f7e6"):(dark?"#1a1a3a":"#ede9fe"),
              border:`1px solid ${copied?(dark?"#276749":"#86efac"):(dark?"#3a3a6a":"#c4b5fd")}`,
              borderRadius:4,padding:"2px 6px",cursor:"pointer",
              fontSize:9,fontFamily:"inherit",
              color:copied?(dark?"#68d391":"#15803d"):(dark?"#a29bfe":"#5b4fd4"),
              display:"flex",alignItems:"center",gap:3,
              transition:"all .2s",zIndex:1,
            }}>
            {copied
              ? <><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied</>
              : <><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2 2v1"/></svg> Copy</>
            }
          </button>
        )}
        <div style={{padding:"6px 8px",paddingRight:sec.body?"52px":"8px",background:dark?"#0c0c1e88":"#f0f0f888",fontSize:10,color:dark?"#a0a0c0":"#5050a0",lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",minHeight:28}}>
          {sec.body?sec.body:<span style={{opacity:.4,fontStyle:"italic"}}>empty</span>}
        </div>
      </div>
    </details>
  );
}

function CellModal({dark, tech, onClose, onSave, categories}) {
  const S = getS(dark);

    if(tech.sections && tech.sections.length > 0) return tech.sections.map(s=>({...s}));

    return [];

  function addSection()                    { setSections(s=>[...s, {id:uid(), title:"Notes", body:"", url:""}]); }
  function removeSection(id)               { setSections(s=>s.filter(x=>x.id!==id)); }
  function updateSection(id, field, value) { setSections(s=>s.map(x=>x.id!==id?x:{...x,[field]:value})); }

  const inputBg     = dark?"#0c0c1e":"#f5f5fc";

        <div style={S.ml}>Edit Action</div>

        <input value={editName} onChange={e=>setEditName(e.target.value)} style={{...S.input,marginBottom:10,fontSize:14,fontWeight:600}}/>

        <div style={{color:dimColor,fontSize:12,marginBottom:20}}>{tech.id}</div>
        <div style={{display:"inline-flex",alignItems:"center",gap:7,background:cat.bg,border:`1px solid ${cat.color}`,borderRadius:20,padding:"5px 14px",marginBottom:20}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:cat.text}}/>
          <span style={{color:cat.text,fontSize:12}}>{cat.label}</span>
        </div>
        <div style={S.ml2}>CATEGORY</div>

        <div style={S.ml2}>REFERENCE URL <span style={{color:dark?"#333":"#ccc"}}>(optional)</span></div>

function PlaybookPanel({dark, theme, playbooks, activePlaybookId, pbMode, onSelect, onSetMode, onDeselect, onAdd, onDelete, onRename, onUpdateDesc, onReorder, onCollapse, onOpenGuide, matrix}) {
  const [collapsed,  setCollapsed]  = useState({});
  const [collapsedPhases, setCollapsedPhases] = useState({});
  const [editingId,  setEditingId]  = useState(null);
  const [editName,   setEditName]   = useState("");
  const [dragId,     setDragId]     = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const [dropPos,    setDropPos]    = useState(null);
  const dragPbRef = useRef(null);

  const isRetro     = theme==="retro";
  const panelBg     = isRetro ? "#0a0a1e" : dark ? "#0e0e1e" : "#f8f8ff";
  const panelBorder = isRetro ? "#00aa2a" : dark ? "#1e1e38" : "#e0e0f0";
  const headerBg    = isRetro ? "#0a0a1e" : dark ? "#111120" : "#ffffff";
  const cardBg      = isRetro ? "#0e0e2a" : dark ? "#0e0e1e" : "#f8f8ff";
  const textMain    = isRetro ? "#00ff41" : dark ? "#ccccee" : "#2a2a4a";
  const textSub     = isRetro ? "#00aa2a" : dark ? "#666688" : "#9090b0";

  function getOrderedTechs(pb) {
    const lookup = {};
    matrix.tactics.forEach(t => t.techniques.forEach(te => { lookup[te.id] = {te, tacticName:t.name}; }));
    return pb.techIds.map(id => lookup[id]).filter(Boolean);
  }
  function getSteps(pb) {
    const lookup = {};
    matrix.tactics.forEach(t => t.techniques.forEach(te => { lookup[te.id] = {te, tactic:t}; }));
    const phaseMap = {};
    pb.techIds.forEach(id => {
      const entry = lookup[id]; if(!entry) return;
      const tid = entry.tactic.id;
      if(!phaseMap[tid]) phaseMap[tid] = {tactic:entry.tactic, techniques:[]};
      phaseMap[tid].techniques.push(entry.te);
    });
    const tacticOrder = matrix.tactics.map(t => t.id);
    return tacticOrder.filter(tid => phaseMap[tid]).map(tid => phaseMap[tid]);
  }
  function getTechUrl(techId) {
    for(const t of matrix.tactics) { const te=t.techniques.find(x=>x.id===techId); if(te) return te.url||""; }
    return "";
  }

  function onDragStart(e, techId, pbId) { setDragId(techId); dragPbRef.current=pbId; e.dataTransfer.effectAllowed="move"; }
  function onDragEnter(e, techId) {
    if(techId===dragId) return; setDragOverId(techId);
    const r=e.currentTarget.getBoundingClientRect();
    setDropPos(e.clientY-(r.top+r.height/2)<=0?"above":"below");
  }
  function onDragOver(e, techId) {
    e.preventDefault(); if(techId===dragId) return;
    const r=e.currentTarget.getBoundingClientRect();
    setDropPos(e.clientY-(r.top+r.height/2)<=0?"above":"below");
  }
  function onDragLeave(e) { if(!e.currentTarget.contains(e.relatedTarget)){ setDragOverId(null); setDropPos(null); } }
  function onDrop(e, targetId, pbId) {
    e.preventDefault();
    if(dragId&&targetId&&dragId!==targetId&&dragPbRef.current===pbId) onReorder(pbId,dragId,targetId,dropPos||"below");
    setDragId(null); setDragOverId(null); setDropPos(null); dragPbRef.current=null;
  }
  function onDragEnd() { setDragId(null); setDragOverId(null); setDropPos(null); dragPbRef.current=null; }

  return (
    <div style={{width:268,flexShrink:0,background:panelBg,borderLeft:isRetro?`2px solid #00ff41`:`1px solid ${panelBorder}`,display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"12px 14px 10px",borderBottom:`1px solid ${panelBorder}`,background:headerBg,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <BookIcon color={isRetro?"#00ff41":"#7c6ff7"} size={14}/>
          <span style={{fontSize:isRetro?7:12,color:isRetro?"#00ff41":"#7c6ff7",letterSpacing:1,fontWeight:600,textShadow:isRetro?"0 0 8px #00ff41":"none"}}>{isRetro?"★ ":""}USE CASES</span>
        </div>
        <div style={{display:"flex",gap:5}}>
          <button onClick={onAdd} title="New use case" style={{background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:5,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <PlusIcon color="#7c6ff7" size={10}/>
          </button>
          <button onClick={onCollapse} title="Collapse panel"
            onMouseEnter={e=>e.currentTarget.style.borderColor="#7c6ff7"}
            onMouseLeave={e=>e.currentTarget.style.borderColor=dark?"#3a3a6a":"#c4b5fd"}
            style={{background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:5,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"border-color .15s"}}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#7c6ff7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 10px 16px"}}>
        {playbooks.length===0 && (
          <div style={{textAlign:"center",color:textSub,fontSize:11,padding:"24px 12px",lineHeight:1.7}}>
            No use cases yet.<br/>Click + to create one.
          </div>
        )}

        {playbooks.map(pb=>{
          const isActive    = activePlaybookId===pb.id;
          const isEdit      = isActive&&pbMode==="edit";
          const isView      = isActive&&pbMode==="view";
          const isCollapsed = !isActive&&!collapsed[pb.id];
          const techCount   = pb.techIds.length;
          const ordered     = getOrderedTechs(pb);
          const steps       = getSteps(pb);

          return (
            <div key={pb.id} className="pb-card fade-in" style={{border:`1px solid ${isActive?pb.color+"99":panelBorder}`,borderRadius:10,marginBottom:8,overflow:"hidden",background:isActive?`${pb.color}0d`:cardBg}}>
              {/* Card header */}
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"9px 10px",cursor:"pointer"}} onClick={()=>isActive?onDeselect():onSelect(pb.id)}>
                <div style={{width:9,height:9,borderRadius:"50%",background:pb.color,flexShrink:0,boxShadow:isActive?`0 0 7px ${pb.color}`:"none",transition:"box-shadow .2s"}}/>
                <div style={{flex:1,minWidth:0}}>
                  {editingId===pb.id ? (
                    <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)}
                      onBlur={()=>{onRename(pb.id,editName.trim()||pb.name);setEditingId(null);}}
                      onKeyDown={e=>{if(e.key==="Enter"){onRename(pb.id,editName.trim()||pb.name);setEditingId(null);}if(e.key==="Escape")setEditingId(null);}}
                      onClick={e=>e.stopPropagation()}
                      style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${pb.color}`,color:textMain,fontSize:12,outline:"none",fontFamily:"inherit",padding:"1px 0"}}/>
                  ) : (
                    <span onDoubleClick={e=>{e.stopPropagation();setEditingId(pb.id);setEditName(pb.name);}} title="Double-click to rename"
                      style={{fontSize:12,color:isActive?textMain:textSub,fontWeight:isActive?600:400,lineHeight:1.2,display:"block"}}>
                      {pb.name}
                    </span>
                  )}
                  {pb.description&&editingId!==pb.id&&(
                    <div onDoubleClick={e=>{e.stopPropagation();setEditingId("desc-"+pb.id);setEditName(pb.description);}} title="Double-click to edit description"
                      style={{fontSize:10,fontStyle:"italic",color:textSub,opacity:.7,lineHeight:1.3,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {pb.description}
                    </div>
                  )}
                  {editingId==="desc-"+pb.id&&(
                    <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)}
                      onBlur={()=>{onUpdateDesc(pb.id,editName.trim());setEditingId(null);}}
                      onKeyDown={e=>{if(e.key==="Enter"){onUpdateDesc(pb.id,editName.trim());setEditingId(null);}if(e.key==="Escape")setEditingId(null);}}
                      onClick={e=>e.stopPropagation()}
                      placeholder="Add description…"
                      style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${pb.color}44`,color:textSub,fontSize:10,fontStyle:"italic",outline:"none",fontFamily:"inherit",padding:"1px 0",marginTop:1}}/>
                  )}
                </div>
                <span style={{fontSize:10,color:isActive?pb.color:textSub,background:isActive?`${pb.color}22`:dark?"#181830":"#eeeefc",borderRadius:10,padding:"1px 7px",flexShrink:0}}>{techCount}</span>
                {!isActive&&techCount>0&&(
                  <div onClick={e=>{e.stopPropagation();setCollapsed(c=>({...c,[pb.id]:!c[pb.id]}));}} style={{cursor:"pointer",opacity:.4,display:"flex"}}>
                    <ChevronIcon color={textSub} size={10} up={!isCollapsed}/>
                  </div>
                )}
                <button onClick={e=>{e.stopPropagation();onDelete(pb.id);}}
                  onMouseEnter={e=>e.currentTarget.style.color="#e94560"}
                  onMouseLeave={e=>e.currentTarget.style.color="#e9456044"}
                  style={{background:"transparent",border:"none",color:"#e9456044",cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 2px",flexShrink:0,transition:"color .15s"}}>×</button>
              </div>

              {/* Mode toggles */}
              {isActive&&!pb.description&&editingId!=="desc-"+pb.id&&(
                <div className="fade-in" style={{padding:"0 10px 6px"}}>
                  <span onClick={e=>{e.stopPropagation();setEditingId("desc-"+pb.id);setEditName("");}}
                    style={{fontSize:10,color:textSub,opacity:.5,cursor:"pointer",fontStyle:"italic",transition:"opacity .15s"}}
                    onMouseEnter={e=>e.currentTarget.style.opacity=1}
                    onMouseLeave={e=>e.currentTarget.style.opacity=.5}>
                    + add description
                  </span>
                </div>
              )}
              {isActive&&(
                <div className="fade-in" style={{display:"flex",gap:6,padding:"0 10px 10px"}}>
                  {[{id:"view",label:"View",Icon:EyeIcon},{id:"edit",label:"Edit",Icon:PencilIcon}].map(({id,label,Icon})=>{
                    const on=pbMode===id;
                    return (
                      <button key={id} className="mode-btn" onClick={()=>onSetMode(id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"6px 0",borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:11,background:on?`${pb.color}22`:"transparent",border:`1px solid ${on?pb.color:dark?"#2a2a45":"#d0d0e8"}`,color:on?pb.color:textSub,transition:"all .15s"}}>
                        <Icon color={on?pb.color:textSub} size={11}/>{label}
                      </button>
                    );
                  })}
                  <button className="mode-btn" onClick={()=>onOpenGuide&&onOpenGuide(pb.id)}
                    style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"6px 0",borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:11,background:"transparent",border:`1px solid ${dark?"#2a2a45":"#d0d0e8"}`,color:textSub,transition:"all .15s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=pb.color;e.currentTarget.style.color=pb.color;}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=dark?"#2a2a45":"#d0d0e8";e.currentTarget.style.color=textSub;}}>
                    <GuideIcon color="currentColor" size={11}/>Guide
                  </button>
                </div>
              )}

              {isView&&(
                <div className="fade-in" style={{padding:"0 10px 8px",display:"flex",alignItems:"center",gap:6}}>
                  <EyeIcon color={pb.color} size={10}/>
                  <span style={{fontSize:10,color:pb.color,opacity:.8}}>Highlighted actions open their link on click</span>
                </div>
              )}
              {isEdit&&(
                <div className="fade-in" style={{padding:"0 10px 8px",display:"flex",alignItems:"center",gap:6}}>
                  <div className="rec-dot" style={{width:6,height:6,borderRadius:"50%",background:pb.color,flexShrink:0}}/>
                  <span style={{fontSize:10,color:pb.color,opacity:.8}}>Click matrix to add/remove · Drag rows to reorder</span>
                </div>
              )}

              {/* Step list */}
              {(isActive||!isCollapsed)&&techCount>0&&(
                <div className="fade-in" style={{borderTop:`1px solid ${pb.color}22`,padding:"6px 0 4px"}}>
                  {isEdit ? (
                    <div>
                      {ordered.map(({te,tacticName})=>{
                        const isDragging=dragId===te.id;
                        const isTarget=dragOverId===te.id;
                        let cls="drag-row pb-tech-row";
                        if(isDragging) cls+=" dragging";
                        if(isTarget&&dropPos==="above") cls+=" drop-above";
                        if(isTarget&&dropPos==="below") cls+=" drop-below";
                        return (
                          <div key={te.id} className={cls} style={{"--drop-color":pb.color,display:"flex",alignItems:"center",gap:5,padding:"4px 8px 4px 4px",margin:"0 4px"}}
                            draggable={true} onDragStart={e=>onDragStart(e,te.id,pb.id)} onDragEnter={e=>onDragEnter(e,te.id)} onDragOver={e=>onDragOver(e,te.id)} onDragLeave={onDragLeave} onDrop={e=>onDrop(e,te.id,pb.id)} onDragEnd={onDragEnd}>
                            <span className="drag-handle" title="Drag to reorder"><GripIcon color={pb.color}/></span>

                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    steps.map(({tactic,techniques})=>{
                      const phaseKey=pb.id+"-"+tactic.id;
                      const isPhaseCollapsed=!collapsedPhases[phaseKey];
                      return (
                      <div key={tactic.id} style={{marginBottom:4}}>

                          onMouseEnter={e=>e.currentTarget.style.opacity=1}
                          onMouseLeave={e=>e.currentTarget.style.opacity=.6}>
                          <svg width="7" height="7" viewBox="0 0 24 24" fill="none" stroke={pb.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                            style={{transform:isPhaseCollapsed?"none":"rotate(90deg)",transition:"transform .15s",flexShrink:0}}>
                            <polyline points="9 18 15 12 9 6"/>
                          </svg>
                          {tactic.name}
                          <span style={{fontSize:8,opacity:.5}}>({techniques.length})</span>
                        </div>
                        {!isPhaseCollapsed&&techniques.map(te=>{
                          const techUrl=getTechUrl(te.id);
                          const clickable=isView&&!!techUrl;
                          return (
                            <div key={te.id} className={`pb-tech-row${clickable?" clickable":""}`} onClick={()=>clickable&&openLink(techUrl)}
                              style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",margin:"0 4px"}}>
                              <div style={{width:4,height:4,borderRadius:"50%",background:pb.color,flexShrink:0,opacity:.7}}/>
                              <span style={{fontSize:11,color:clickable?textMain:textSub,flex:1,lineHeight:1.3}}>{te.name}</span>
                              {clickable?<LinkIcon color={pb.color} size={9}/>:<span style={{fontSize:9,color:textSub,opacity:.6}}>{te.id}</span>}
                            </div>

                        })}

                    })
                  )}

              )}
            </div>
          );
        })}
      </div>

      {/* Footer */}
      {activePlaybookId&&(
        <div style={{padding:"8px 10px",borderTop:`1px solid ${panelBorder}`,flexShrink:0}}>
          <button onClick={onDeselect}
            onMouseEnter={e=>{e.target.style.borderColor="#e94560";e.target.style.color="#e94560";}}
            onMouseLeave={e=>{e.target.style.borderColor=dark?"#2e2e5e":"#d0d0e8";e.target.style.color=dark?"#666":"#aaa";}}

    </div>
  );
}

function GuideSection({sec, dark, pbColor}) {
  const [open, setOpen] = useState(false);
  const [copied, setCopied] = useState(false);
  const textSub  = dark?"#8888aa":"#6060a0";
  const textMain = dark?"#ccc":"#333";
  const borderC  = dark?"#252545":"#d8d8f0";

  function handleCopy(e) {
    e.stopPropagation();
    if(!sec.body) return;
    navigator.clipboard.writeText(sec.body).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 1800);
    }).catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = sec.body;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(()=>setCopied(false), 1800);
    });
  }

  return (
    <div style={{marginBottom:4}}>
      <div onClick={()=>setOpen(!open)}
        style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",padding:"4px 0"}}
        onMouseEnter={e=>e.currentTarget.querySelector('.sec-title').style.color=pbColor}
        onMouseLeave={e=>e.currentTarget.querySelector('.sec-title').style.color=textSub}>
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke={textSub} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
          style={{transform:open?"rotate(90deg)":"none",transition:"transform .15s",flexShrink:0}}>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span className="sec-title" style={{fontSize:11,fontWeight:600,color:textSub,letterSpacing:.5,transition:"color .12s"}}>{sec.title || "Notes"}</span>
        {sec.url&&(
          <a href={sec.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
            title={sec.url}
            style={{display:"inline-flex",alignItems:"center",opacity:.5,transition:"opacity .15s"}}
            onMouseEnter={e=>e.currentTarget.style.opacity=1}
            onMouseLeave={e=>e.currentTarget.style.opacity=.5}>
            <LinkIcon color={dark?"#63b3ed":"#2b6cb0"} size={9}/>
          </a>
        )}
      </div>
      {open && (
        <div className="fade-in" style={{position:"relative",margin:"2px 0 6px 14px",borderRadius:5,border:`1px solid ${borderC}`,overflow:"hidden"}}>
          {sec.body&&(
            <button
              onClick={handleCopy}
              title={copied?"Copied!":"Copy to clipboard"}
              style={{
                position:"absolute",top:5,right:5,
                background:copied?(dark?"#1a3a1a":"#e6f7e6"):(dark?"#1a1a3a":"#ede9fe"),
                border:`1px solid ${copied?(dark?"#276749":"#86efac"):(dark?"#3a3a6a":"#c4b5fd")}`,
                borderRadius:4,padding:"2px 6px",cursor:"pointer",
                fontSize:9,fontFamily:"inherit",
                color:copied?(dark?"#68d391":"#15803d"):(dark?"#a29bfe":"#5b4fd4"),
                display:"flex",alignItems:"center",gap:3,
                transition:"all .2s",zIndex:1,
              }}>
              {copied
                ? <><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied</>
                : <><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2 2v1"/></svg> Copy</>
              }
            </button>
          )}
          <div style={{padding:"6px 8px",paddingRight:sec.body?"52px":"8px",background:dark?"#0c0c1e88":"#f0f0f888",fontSize:12,color:textMain,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",minHeight:28}}>
            {sec.body || <span style={{opacity:.4,fontStyle:"italic"}}>empty</span>}
          </div>
        </div>
      )}
    </div>
  );
}

// INCIDENT VIEW — helpers

const ICER_CODES  = ['I','C','E','R'];
const ICER_LABELS = { I:'Identification', C:'Containment', E:'Eradication', R:'Recovery' };

function fmtElapsed(fromMs, nowMs) {
  if (!fromMs) return '—';
  const s   = Math.max(0, Math.floor((nowMs - fromMs) / 1000));
  const h   = Math.floor(s / 3600);
  const m   = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const p   = n => String(n).padStart(2,'0');
  return h > 0 ? `${p(h)}:${p(m)}:${p(sec)}` : `${p(m)}:${p(sec)}`;
}
function fmtTs(ms) {
  if (!ms) return '—';
  const d = new Date(ms), p = n => String(n).padStart(2,'0');
  const tz = new Intl.DateTimeFormat('en', {timeZoneName:'short'}).formatToParts(d).find(pt=>pt.type==='timeZoneName')?.value || '';
  return `${p(d.getDate())}/${p(d.getMonth()+1)} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())} ${tz}`;
}

// ─────────────────────────────────────────────────────────────────
// KanbanCard
// ─────────────────────────────────────────────────────────────────
function KanbanCard({ card, colStatus, colColor, colLabel, phaseColor, now, dark, isRetro, font,
                      getCat, textMain, textSub, textDim, border, border2, cardBg,
                      onMove, onOwner, onNotes, onImages, onRemove }) {
  const [ownerVal,  setOwnerVal]  = React.useState(card.owner  || '');
  const [notesVal,  setNotesVal]  = React.useState(card.notes  || '');
  const [imagesVal, setImagesVal] = React.useState(card.images || []);
  React.useEffect(() => { setOwnerVal(card.owner   || ''); }, [card.owner]);
  React.useEffect(() => { setNotesVal(card.notes   || ''); }, [card.notes]);
  React.useEffect(() => { setImagesVal(card.images || []); }, [card.images]);

  function handlePaste(e) {
    const items = Array.from(e.clipboardData?.items || []);
    const imageItem = items.find(item => item.type.startsWith('image/'));
    if (!imageItem) return;
    e.preventDefault();
    const reader = new FileReader();
    reader.onload = ev => {
      const next = [...imagesVal, ev.target.result];
      setImagesVal(next);
      onImages(card.id, next);
    };
    reader.readAsDataURL(imageItem.getAsFile());
  }

  function removeImage(idx) {
    const next = imagesVal.filter((_,i) => i !== idx);
    setImagesVal(next);
    onImages(card.id, next);
  }

  const cat       = getCat(card.category);
  const stageTs   = colStatus==='todo' ? card.todoAt : colStatus==='inprogress' ? card.startedAt : colStatus==='blocked' ? card.blockedAt : card.completedAt;
  const elapsed   = fmtElapsed(stageTs, now);
  const ph        = phaseColor;

  return (
    <div style={{
      background: cardBg,
      border: isRetro ? `1px solid ${ph.border}66` : `1px solid ${border}`,
      borderRadius: isRetro ? 0 : 6,
      padding: '9px 10px', marginBottom: 7,
      boxShadow: isRetro ? '3px 3px 0 #000' : dark ? '0 1px 6px rgba(0,0,0,.35)' : '0 1px 4px rgba(0,0,0,.07)',
      position: 'relative',
    }}>
      {/* Top row — ID + remove */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontSize:isRetro?5:8,color:isRetro?'#00aa2a':textDim,letterSpacing:.5}}>
          {isRetro?'▸ ':''}{card.techId||'CUSTOM'}
        </span>
        <button onClick={()=>onRemove(card.id)}
          onMouseEnter={e=>e.currentTarget.style.color='#e94560'}
          onMouseLeave={e=>e.currentTarget.style.color='#e9456044'}
          style={{background:'none',border:'none',color:'#e9456044',cursor:'pointer',fontSize:13,lineHeight:1,padding:0}}
          title="Remove">×</button>
      </div>

      {/* Action name */}
      <div style={{fontSize:isRetro?7:11,fontWeight:600,color:textMain,lineHeight:isRetro?1.7:1.4,marginBottom:5}}>
        {card.techName}
      </div>

      {/* Category badge */}
      {card.category && (
        <div style={{marginBottom:6}}>
          <span style={{
            fontSize:isRetro?5:8, background:`${cat.color}20`,
            border:isRetro?`1px solid ${cat.color}`:`1px solid ${cat.color}44`,
            borderRadius:isRetro?0:8, padding:'1px 5px', color:cat.text,
          }}>{cat.label}</span>
        </div>
      )}

      {/* Owner */}
      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:6}}>
        <span style={{fontSize:isRetro?5:10,flexShrink:0}}>👤</span>
        <input
          value={ownerVal}
          onChange={e=>setOwnerVal(e.target.value)}
          onBlur={()=>onOwner(card.id, ownerVal)}
          placeholder="Assign owner…"
          style={{
            flex:1, background:'transparent', border:'none',
            borderBottom:isRetro?'1px solid #006618':`1px solid ${dark?'#2a2a48':'#d0d0e8'}`,
            color:ownerVal?(isRetro?'#00ff41':textMain):textDim,
            fontFamily:font, fontSize:isRetro?6:10, outline:'none', padding:'1px 2px',
          }}/>
      </div>

      {/* Live stage timer */}
      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:4}}>
        <span style={{fontSize:isRetro?6:10}}>⏱</span>
        <span style={{
          fontSize:isRetro?7:11, fontVariantNumeric:'tabular-nums',
          color:colColor, fontWeight:700, letterSpacing:1,
          textShadow:isRetro?`0 0 5px ${colColor}`:'none',
        }}>{elapsed}</span>
        <span style={{fontSize:isRetro?5:8,color:textDim}}>in {colLabel.toLowerCase()}</span>
      </div>

      {/* Stage entry + captured timestamps */}
      <div style={{
        fontSize:isRetro?5:8, color:textDim,
        borderTop:`1px solid ${border2}`, paddingTop:4, marginTop:4,
        display:'flex', flexDirection:'column', gap:2,
      }}>
        {stageTs          && <span>Entered:  {fmtTs(stageTs)}</span>}
        {card.assignedAt  && <span>Assigned: {fmtTs(card.assignedAt)}</span>}
        {card.startedAt   && colStatus!=='todo' && <span>Started:  {fmtTs(card.startedAt)}</span>}
        {card.blockedAt   && <span style={{color:isRetro?'#ff4444':dark?'#fc8181':'#c53030'}}>Blocked:  {fmtTs(card.blockedAt)}</span>}
        {card.completedAt && <span>Closed:   {fmtTs(card.completedAt)}</span>}
      </div>

      {/* Notes */}
      <div style={{marginTop:8}}>
        <div style={{fontSize:isRetro?5:9,color:isRetro?'#00aa2a':textDim,letterSpacing:1,marginBottom:4}}>
          {isRetro?'▸ ':''}NOTES
        </div>
        <textarea
          value={notesVal}
          onChange={e=>setNotesVal(e.target.value)}
          onBlur={()=>onNotes(card.id, notesVal)}
          onPaste={handlePaste}
          placeholder="Add context, findings, observations…"
          rows={2}
          style={{
            width:'100%', boxSizing:'border-box',
            background:isRetro?'#06061a':dark?'#0c0c20':'#f8f8ff',
            border:isRetro?'1px solid #006618':`1px solid ${dark?'#2a2a48':'#d8d8f0'}`,
            borderRadius:isRetro?0:4,
            color:notesVal?(isRetro?'#00ff41':textMain):textDim,
            fontFamily:font, fontSize:isRetro?6:10,
            padding:'5px 7px', outline:'none', resize:'vertical',
            lineHeight:1.5,
          }}/>
        <div style={{fontSize:isRetro?5:8,color:textDim,marginTop:3,marginBottom:imagesVal.length?6:0}}>
          Ctrl+V / ⌘V to paste a screenshot
        </div>
        {/* Screenshot thumbnails */}
        {imagesVal.length>0&&(
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {imagesVal.map((src,idx)=>(
              <div key={idx} style={{position:'relative',flexShrink:0}}>
                <img src={src} alt={`screenshot ${idx+1}`}
                  style={{
                    width:80, height:60, objectFit:'cover',
                    border:isRetro?'1px solid #00aa2a':`1px solid ${dark?'#2a2a48':'#d8d8f0'}`,
                    borderRadius:isRetro?0:4, display:'block', cursor:'pointer',
                  }}
                  onClick={()=>window.open(src,'_blank')}
                  title="Click to open full size"
                />
                <button
                  onClick={()=>removeImage(idx)}
                  title="Remove screenshot"
                  style={{
                    position:'absolute', top:-5, right:-5,
                    width:16, height:16,
                    background:isRetro?'#1a0404':dark?'#2a1010':'#fff',
                    border:isRetro?'1px solid #ff4444':`1px solid ${dark?'#7a2020':'#fda4af'}`,
                    borderRadius:'50%',
                    color:isRetro?'#ff4444':dark?'#fc8181':'#c53030',
                    cursor:'pointer', fontSize:10, lineHeight:1,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    padding:0,
                  }}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Move buttons */}
      <div style={{display:'flex',gap:4,marginTop:8,flexWrap:'wrap'}}>
        {/* ← Back */}
        {colStatus !== 'todo' && (
          <button onClick={()=>onMove(card.id, colStatus==='inprogress'?'todo':'inprogress')}
            style={{
              flex:1, background:'transparent',
              border:isRetro?'1px solid #444':`1px solid ${dark?'#3a3a6a':'#d0d0e8'}`,
              borderRadius:isRetro?0:4,
              color:isRetro?'#666':textSub,
              padding:'3px 6px', cursor:'pointer', fontFamily:font,
              fontSize:isRetro?5:9,
            }}>
            ← {colStatus==='inprogress'?'To Do':'In Progress'}
          </button>
        )}
        {/* ⚠ Block — only available from In Progress */}
        {colStatus === 'inprogress' && (
          <button onClick={()=>onMove(card.id, 'blocked')}
            style={{
              flex:1, background:'transparent',
              border:isRetro?'1px solid #ff4444':`1px solid ${dark?'#7a2020':'#fda4af'}`,
              borderRadius:isRetro?0:4,
              color:isRetro?'#ff4444':dark?'#fc8181':'#c53030',
              padding:'3px 6px', cursor:'pointer', fontFamily:font,
              fontSize:isRetro?5:9, fontWeight:600,
            }}>
            ⚠ Hold
          </button>
        )}
        {/* Forward → */}
        {colStatus !== 'completed' && (
          <button onClick={()=>onMove(card.id, colStatus==='todo'?'inprogress':'completed')}
            style={{
              flex:1,
              background:isRetro?'transparent':dark?'#1a1a38':'#f0f0fc',
              border:isRetro?`1px solid ${colColor}`:`1px solid ${dark?'#3a3a6a':'#c4b5fd'}`,
              borderRadius:isRetro?0:4,
              color:isRetro?colColor:dark?'#a29bfe':'#5b4fd4',
              padding:'3px 6px', cursor:'pointer', fontFamily:font,
              fontSize:isRetro?5:9, fontWeight:600,
              boxShadow:isRetro?'2px 2px 0 #000':'none',
            }}>
            {colStatus==='todo'?'Start →':'Complete ✓'}
          </button>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// AddActionModal
// ─────────────────────────────────────────────────────────────────
function IncidentAddModal({ allIcerTechs, activeInc, dark, isRetro, font, textMain, textSub, textDim,
                           border, PHASE_COLORS, categories, getCat, onAdd, onClose }) {
  const [tab,         setTab]         = React.useState('library');
  const [search,      setSearch]      = React.useState('');
  const [phaseFilter, setPhaseFilter] = React.useState('');
  const [catFilter,   setCatFilter]   = React.useState('');
  const [customName,  setCustomName]  = React.useState('');
  const [customPhase, setCustomPhase] = React.useState('I');

  const existingIds = (activeInc?.cards||[]).map(c=>c.techId).filter(Boolean);
  const filtered = allIcerTechs.filter(te => {
    const ms = !search || te.name.toLowerCase().includes(search.toLowerCase()) || te.id.toLowerCase().includes(search.toLowerCase()) || (te.category&&te.category.toLowerCase().includes(search.toLowerCase()));
    const mp = !phaseFilter || te.tacticShortcode === phaseFilter;
    const mc = !catFilter   || te.category === catFilter;
    return ms && mp && mc && !existingIds.includes(te.id);
  });

  function addCustom() {
    if (!customName.trim()) return;
    onAdd({
      id: null, name: customName.trim(),
      tacticShortcode: customPhase,
      tacticName: ICER_LABELS[customPhase] || customPhase,
      tacticId: customPhase.toLowerCase(),
      category: '',
    }, true);
    setCustomName('');
    onClose();
  }

  const bg       = isRetro?'#0a0a1e':dark?'#141428':'#ffffff';
  const surfBg   = isRetro?'#0e0e28':dark?'#1a1a38':'#f5f5fc';
  const inBorder = isRetro?'1px solid #00aa2a':`1px solid ${dark?'#2a2a48':'#c0c0da'}`;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:bg,
        border:isRetro?'2px solid #00ff41':`1px solid ${dark?'#2e2e5e':'#c8c8e0'}`,
        borderRadius:isRetro?0:12,
        width:520, maxWidth:'92vw', maxHeight:'78vh',
        display:'flex', flexDirection:'column',
        fontFamily:font,
        boxShadow:isRetro?'6px 6px 0 #000':dark?'0 24px 60px rgba(0,0,0,.6)':'0 24px 60px rgba(0,0,0,.15)',
      }}>
        {/* Header */}
        <div style={{
          padding:'12px 16px',
          borderBottom:isRetro?'2px solid #00ff41':`1px solid ${dark?'#2e2e5e':'#d0d0e8'}`,
          display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0,
        }}>
          <span style={{fontSize:isRetro?8:13,fontWeight:700,color:isRetro?'#00ff41':textMain,textShadow:isRetro?'0 0 6px #00ff41':'none'}}>
            {isRetro?'► ':''}Add Action
          </span>
          <button onClick={onClose} style={{background:'none',border:'none',color:textDim,cursor:'pointer',fontSize:16}}>×</button>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',borderBottom:isRetro?'1px solid #006618':`1px solid ${dark?'#2e2e5e':'#d0d0e8'}`,flexShrink:0}}>
          {[{id:'library',label:'From Library'},{id:'custom',label:'Custom Action'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1, padding:'8px',
              background:tab===t.id?(isRetro?'#0e0e28':dark?'#1a1a38':'#ede9fe'):'transparent',
              border:'none',
              borderBottom:tab===t.id?`2px solid ${isRetro?'#00ff41':dark?'#7c6ff7':'#5b4fd4'}`:'2px solid transparent',
              color:tab===t.id?(isRetro?'#00ff41':dark?'#a29bfe':'#5b4fd4'):textDim,
              cursor:'pointer', fontFamily:font, fontSize:isRetro?7:11,
            }}>{t.label}</button>
          ))}
        </div>

        {tab==='library' ? (
          <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden',padding:'10px 12px'}}>
            {/* Search + filters */}
            <div style={{display:'flex',gap:8,marginBottom:9,flexShrink:0,flexWrap:'wrap'}}>
              <input autoFocus value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Search actions…"
                style={{flex:1,minWidth:120,background:surfBg,border:inBorder,borderRadius:isRetro?0:6,
                  color:textMain,padding:'6px 10px',fontFamily:font,fontSize:isRetro?7:11,outline:'none'}}/>
              <select value={phaseFilter} onChange={e=>setPhaseFilter(e.target.value)}
                style={{background:surfBg,border:inBorder,borderRadius:isRetro?0:6,
                  color:textMain,padding:'4px 8px',fontFamily:font,fontSize:isRetro?7:10,outline:'none',cursor:'pointer'}}>
                <option value="">All Phases</option>
                {ICER_CODES.map(c=><option key={c} value={c}>{c} — {ICER_LABELS[c]}</option>)}
              </select>
              <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
                style={{background:surfBg,border:inBorder,borderRadius:isRetro?0:6,
                  color:textMain,padding:'4px 8px',fontFamily:font,fontSize:isRetro?7:10,outline:'none',cursor:'pointer'}}>
                <option value="">All Categories</option>
                {categories.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </div>
            {/* Count */}
            <div style={{fontSize:isRetro?5:9,color:textDim,marginBottom:6,flexShrink:0}}>{filtered.length} action{filtered.length!==1?'s':''} available</div>
            {/* List */}
            <div style={{flex:1,overflowY:'auto'}}>
              {filtered.length===0 && (
                <div style={{textAlign:'center',padding:'24px',color:textDim,fontSize:isRetro?7:11}}>No actions found</div>
              )}
              {ICER_CODES.map(code=>{
                const group = filtered.filter(t=>t.tacticShortcode===code);
                if(!group.length) return null;
                const ph = PHASE_COLORS[code];
                return (
                  <div key={code} style={{marginBottom:10}}>
                    <div style={{
                      fontSize:isRetro?5:9,fontWeight:700,letterSpacing:2,textTransform:'uppercase',
                      color:ph.text,background:ph.bg,
                      border:isRetro?`1px solid ${ph.border}`:'none',
                      borderRadius:isRetro?0:3,
                      padding:'3px 8px',marginBottom:4,display:'inline-flex',alignItems:'center',gap:4,
                    }}>{ICER_LABELS[code]}</div>
                    {group.map(te=>{
                      const cat=getCat(te.category);
                      return (
                        <div key={te.id} onClick={()=>{onAdd(te,false);}}
                          className="pb-tech-row clickable"
                          style={{
                            padding:'6px 8px',marginBottom:2,cursor:'pointer',
                            border:isRetro?'1px solid #006618':'1px solid transparent',
                            borderRadius:isRetro?0:4,
                            display:'flex',alignItems:'flex-start',gap:8,
                          }}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:isRetro?5:8,color:textDim,marginBottom:1}}>{te.id}</div>
                            <div style={{fontSize:isRetro?7:11,color:textMain,lineHeight:1.4}}>{te.name}</div>
                          </div>
                          {te.category&&(
                            <span style={{
                              fontSize:isRetro?5:8, flexShrink:0, marginTop:2,
                              color:cat.text, background:`${cat.color}22`,
                              border:`1px solid ${cat.color}55`,
                              borderRadius:isRetro?0:8, padding:'1px 6px',
                            }}>{cat.label}</span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          <div style={{padding:'18px',flex:1}}>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:isRetro?6:10,color:textDim,letterSpacing:1,marginBottom:7}}>PHASE</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {ICER_CODES.map(code=>{
                  const ph=PHASE_COLORS[code]; const on=customPhase===code;
                  return (
                    <button key={code} onClick={()=>setCustomPhase(code)} style={{
                      background:on?ph.bg:'transparent',
                      border:isRetro?`1px solid ${on?ph.border:'#444'}`:`1px solid ${on?ph.border:dark?'#3a3a6a':'#d0d0e8'}`,
                      borderRadius:isRetro?0:4, color:on?ph.text:textDim,
                      padding:'5px 14px', cursor:'pointer', fontFamily:font,
                      fontSize:isRetro?6:10, fontWeight:on?700:400,
                    }}>{code}</button>
                  );
                })}
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:isRetro?6:10,color:textDim,letterSpacing:1,marginBottom:7}}>ACTION DESCRIPTION</div>
              <input autoFocus value={customName} onChange={e=>setCustomName(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&addCustom()}
                placeholder="Describe the action…"
                style={{
                  width:'100%',background:surfBg,border:inBorder,
                  borderRadius:isRetro?0:6,color:textMain,
                  padding:'8px 10px',fontFamily:font,fontSize:isRetro?7:11,
                  outline:'none',boxSizing:'border-box',
                }}/>
            </div>
            <button onClick={addCustom} style={{
              width:'100%',
              background:isRetro?'transparent':'linear-gradient(135deg,#6c5ce7,#a29bfe)',
              border:isRetro?'2px solid #00ff41':'none',
              borderRadius:isRetro?0:7,
              color:isRetro?'#00ff41':'#fff',
              padding:'10px', cursor:'pointer', fontFamily:font,
              fontSize:isRetro?7:12, fontWeight:600,
              boxShadow:isRetro?'3px 3px 0 #000':'none',
            }}>+ Add to To Do</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────
function IncidentView({ matrix, theme, dark, onClose }) {
  const isRetro  = theme==='retro';
  const font     = isRetro?"'Press Start 2P',monospace":"'DM Mono',monospace";

  // Stable initial incident ID
  const initRef = React.useRef(null);
  if (!initRef.current) { initRef.current = { id: uid() }; }

  const [incidents,    setIncidents]   = React.useState(()=>[{
    id: initRef.current.id, name:'INC-001 New Incident',
    createdAt: Date.now(), playbookId: null, cards: [],
  }]);
  const [activeId,     setActiveId]    = React.useState(initRef.current.id);
  const [sidebarOpen,  setSidebarOpen] = React.useState(true);
  const [now,          setNow]         = React.useState(Date.now());
  const [showAdd,      setShowAdd]     = React.useState(false);
  const [editingIncId,    setEditingIncId]   = React.useState(null);
  const [editIncName,     setEditIncName]    = React.useState('');
  const [collapsedGroups, setCollapsedGroups]= React.useState(new Set());

  function toggleGroup(key) {
    setCollapsedGroups(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  }

  // Live 1-second tick for all timers
  React.useEffect(()=>{
    const t = setInterval(()=>setNow(Date.now()), 1000);
    return ()=>clearInterval(t);
  },[]);

  // ── Derived ──
  const categories   = matrix.categories || DEFAULT_CATEGORIES;
  const getCat       = id => categories.find(c=>c.id===id)||categories[0];
  const icerTactics  = (matrix.tactics||[]).filter(t=>ICER_CODES.includes(t.shortcode));
  const allIcerTechs = icerTactics.flatMap(t=>
    t.techniques.map(te=>({...te, tacticId:t.id, tacticName:t.name, tacticShortcode:t.shortcode}))
  );
  const activeInc    = incidents.find(i=>i.id===activeId) || incidents[0];

  // ── Theme colours ──
  const bg        = isRetro?'#0a0a1e':dark?'#0e0e18':'#f0f0f8';
  const headerBg  = isRetro?'#06061a':dark?'#0a0a20':'#ffffff';
  const sidebarBg = isRetro?'#06061a':dark?'#0a0a1e':'#f8f8ff';
  const border    = isRetro?'#00aa2a':dark?'#2e2e50':'#d8d8f0';
  const border2   = isRetro?'#006618':dark?'#1e1e38':'#ebebf5';
  const textMain  = isRetro?'#00ff41':dark?'#e8e8f0':'#1a1a2e';
  const textSub   = isRetro?'#00aa2a':dark?'#8888aa':'#6060a0';
  const textDim   = isRetro?'#006618':dark?'#555577':'#a0a0c0';
  const cardBg    = isRetro?'#0e0e2a':dark?'#141630':'#ffffff';

  const PHASE_COLORS = isRetro ? {
    I: { bg:'#001a40', text:'#00ccff', border:'#00aaff' },
    C: { bg:'#2a1800', text:'#ffaa00', border:'#ff8800' },
    E: { bg:'#2a0010', text:'#ff3366', border:'#ff003c' },
    R: { bg:'#002a10', text:'#33ff66', border:'#00ff41' },
    AD:{ bg:'#1a1a00', text:'#ffcc00', border:'#ffcc00' },
  } : {
    I: { bg:dark?'#1a365d':'#dbeafe', text:dark?'#63b3ed':'#1d4ed8', border:dark?'#3a6a9a':'#93c5fd' },
    C: { bg:dark?'#4a2e08':'#ffedd5', text:dark?'#f6ad55':'#c2410c', border:dark?'#7a5020':'#fdba74' },
    E: { bg:dark?'#4a1010':'#ffe4e6', text:dark?'#fc8181':'#be123c', border:dark?'#7a2020':'#fda4af' },
    R: { bg:dark?'#143325':'#dcfce7', text:dark?'#68d391':'#15803d', border:dark?'#2a6040':'#86efac' },
    AD:{ bg:dark?'#2e2e08':'#fefce8', text:dark?'#fbd38d':'#92400e', border:dark?'#5a5010':'#fde68a' },
  };

  const COLS = [
    { status:'todo',        label:'TO DO',         color:isRetro?'#00aaff':dark?'#63b3ed':'#2b6cb0', colBg:isRetro?'#07071a':dark?'#0d0d22':'#f5f5fc' },
    { status:'inprogress',  label:'IN PROGRESS',   color:isRetro?'#ffcc00':dark?'#f6ad55':'#c2410c', colBg:isRetro?'#120e00':dark?'#12100a':'#fffbf5' },
    { status:'blocked',     label:'BLOCKER / HOLD', color:isRetro?'#ff4444':dark?'#fc8181':'#c53030', colBg:isRetro?'#1a0404':dark?'#160808':'#fff5f5' },
    { status:'completed',   label:'COMPLETED',     color:isRetro?'#33ff66':dark?'#68d391':'#15803d', colBg:isRetro?'#061206':dark?'#0a140a':'#f0fdf4' },
  ];

  // ── Incident management ──
  function createIncident() {
    const id = uid();
    const n  = incidents.length + 1;
    const inc = { id, name:`INC-00${n} New Incident`, createdAt:Date.now(), playbookId:null, cards:[] };
    setIncidents(p=>[...p, inc]);
    setActiveId(id);
  }
  function deleteIncident(id) {
    setIncidents(p=>{
      const next = p.filter(i=>i.id!==id);
      if (next.length===0) {
        const nid=uid();
        setActiveId(nid);
        return [{ id:nid, name:'INC-001 New Incident', createdAt:Date.now(), playbookId:null, cards:[] }];
      }
      if (activeId===id) setActiveId(next[0].id);
      return next;
    });
  }
  function updateInc(id, fn) {
    setIncidents(p=>p.map(i=>i.id===id?fn(i):i));
  }

  // ── Playbook loader ──
  function loadPlaybook(pbId) {
    const pb = (matrix.playbooks||[]).find(p=>p.id===pbId);
    if (!pb) return;
    const newCards = [];
    icerTactics.forEach(tactic=>{
      tactic.techniques.forEach(te=>{
        if (pb.techIds.includes(te.id)) {
          newCards.push({
            id:uid(), techId:te.id, techName:te.name,
            tacticId:tactic.id, tacticName:tactic.name, tacticShortcode:tactic.shortcode,
            category:te.category||'', isAdHoc:false,
            status:'todo', owner:'', notes:'', images:[],
            todoAt:Date.now(), assignedAt:null, startedAt:null, blockedAt:null, completedAt:null,
          });
        }
      });
    });
    updateInc(activeId, i=>({
      ...i, playbookId:pbId,
      cards:[...i.cards.filter(c=>c.isAdHoc), ...newCards],
    }));
  }

  // ── Card management ──
  function addCard(tech, isAdHoc=false) {
    const tactic = isAdHoc
      ? { id:tech.tacticId||'adhoc', name:tech.tacticName||'Ad-hoc', shortcode:tech.tacticShortcode||'AD' }
      : icerTactics.find(t=>t.techniques.find(te=>te.id===tech.id));
    if (!tactic && !isAdHoc) return;
    const card = {
      id:uid(), techId:tech.id||null, techName:tech.name,
      tacticId:tactic.id, tacticName:tactic.name, tacticShortcode:tactic.shortcode,
      category:tech.category||'', isAdHoc,
      status:'todo', owner:'', notes:'', images:[],
      todoAt:Date.now(), assignedAt:null, startedAt:null, blockedAt:null, completedAt:null,
    };
    updateInc(activeId, i=>({...i, cards:[...i.cards, card]}));
    setShowAdd(false);
  }
  function moveCard(cardId, newStatus) {
    updateInc(activeId, i=>({
      ...i, cards:i.cards.map(c=>{
        if (c.id!==cardId) return c;
        const t=Date.now();
        return {
          ...c, status:newStatus,
          todoAt:      newStatus==='todo'       && !c.todoAt      ? t : c.todoAt,
          startedAt:   newStatus==='inprogress' && !c.startedAt   ? t : c.startedAt,
          blockedAt:   newStatus==='blocked'                       ? t : c.blockedAt,
          completedAt: newStatus==='completed'                     ? t : c.completedAt,
        };
      }),
    }));
  }
  function setOwnerFn(cardId, owner) {
    updateInc(activeId, i=>({
      ...i, cards:i.cards.map(c=>{
        if (c.id!==cardId) return c;
        return {
          ...c, owner,
          assignedAt: owner && !c.assignedAt ? Date.now() : (owner ? c.assignedAt : null),
        };
      }),
    }));
  }
  function setNotesFn(cardId, notes) {
    updateInc(activeId, i=>({
      ...i, cards:i.cards.map(c=>c.id===cardId ? {...c, notes} : c),
    }));
  }
  function setImagesFn(cardId, images) {
    updateInc(activeId, i=>({
      ...i, cards:i.cards.map(c=>c.id===cardId ? {...c, images} : c),
    }));
  }
  function removeCard(cardId) {
    updateInc(activeId, i=>({...i, cards:i.cards.filter(c=>c.id!==cardId)}));
  }

  // ── Export ──
  function exportIncident() {
    const inc = activeInc;
    const pbName = inc.playbookId ? (matrix.playbooks||[]).find(p=>p.id===inc.playbookId)?.name : null;
    const data = {
      incident:    inc.name,
      createdAt:   new Date(inc.createdAt).toISOString(),
      playbook:    pbName || null,
      summary: {
        todo:       inc.cards.filter(c=>c.status==='todo').length,
        inProgress: inc.cards.filter(c=>c.status==='inprogress').length,
        completed:  inc.cards.filter(c=>c.status==='completed').length,
      },
      actions: inc.cards.map(c=>({
        id: c.techId, name: c.techName,
        phase: c.tacticShortcode, category: c.category,
        owner: c.owner || 'Unassigned',
        status: c.status,
        notes: c.notes || '',
        screenshots: (c.images||[]).length,
        timestamps: {
          addedToToDo:       c.todoAt      ? new Date(c.todoAt).toISOString()      : null,
          ownerAssigned:     c.assignedAt  ? new Date(c.assignedAt).toISOString()  : null,
          movedToInProgress: c.startedAt   ? new Date(c.startedAt).toISOString()   : null,
          blocked:           c.blockedAt   ? new Date(c.blockedAt).toISOString()   : null,
          completed:         c.completedAt ? new Date(c.completedAt).toISOString() : null,
        },
      })),
    };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
    a.download = `incident-${inc.name.replace(/\s+/g,'-')}_${dateStamp()}.json`;
    a.click();
  }

  // ── Group cards by ICER phase ──
  function groupCards(cards) {
    const catOrder = categories.map(c=>c.id);
    const groups = [];
    ICER_CODES.forEach(code=>{
      const tc = icerTactics.find(t=>t.shortcode===code);
      if (!tc) return;
      const cds = cards.filter(c=>c.tacticShortcode===code);
      if (!cds.length) return;
      cds.sort((a,b)=>{
        const ai=catOrder.indexOf(a.category), bi=catOrder.indexOf(b.category);
        return (ai===-1?999:ai)-(bi===-1?999:bi);
      });
      groups.push({tactic:tc, cards:cds});
    });
    const adhoc = cards.filter(c=>!ICER_CODES.includes(c.tacticShortcode));
    if (adhoc.length) groups.push({tactic:{id:'adhoc',name:'Ad-hoc',shortcode:'AD'}, cards:adhoc});
    return groups;
  }

  const todoCards     = (activeInc?.cards||[]).filter(c=>c.status==='todo');
  const ipCards       = (activeInc?.cards||[]).filter(c=>c.status==='inprogress');
  const blockedCards  = (activeInc?.cards||[]).filter(c=>c.status==='blocked');
  const doneCards     = (activeInc?.cards||[]).filter(c=>c.status==='completed');

  // ── Btn shared style ──
  const btn = (hi) => ({
    background:isRetro?'#0a0a1e':dark?'#1a1a3a':'#f0f0f8',
    border:isRetro?`2px solid ${hi?'#ffcc00':'#00ff41'}`:`1px solid ${hi?(dark?'#6c5ce7':'#a78bfa'):border}`,
    borderRadius:isRetro?0:6, color:isRetro?(hi?'#ffcc00':'#00ff41'):(hi?(dark?'#a29bfe':'#5b4fd4'):textMain),

    fontSize:isRetro?7:11, display:'flex', alignItems:'center', gap:5,
    boxShadow:isRetro?'3px 3px 0 #000':'none',
  });

  return (
    <div style={{

      background:bg, fontFamily:font, display:'flex', flexDirection:'column', color:textMain,

      {isRetro&&<div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999,
        background:'repeating-linear-gradient(0deg,rgba(0,255,65,.03) 0px,rgba(0,255,65,.03) 1px,transparent 1px,transparent 3px)',
        mixBlendMode:'overlay'}}/>}

      {/* ── TOP BAR ── */}
      <div style={{
        background:headerBg, flexShrink:0,
        borderBottom:isRetro?'2px solid #00ff41':`1px solid ${border}`,

        boxShadow:isRetro?'0 4px 0 #000':'none',
      }}>
        <button onClick={onClose} style={btn(false)}>

        </button>

        <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}}>
          <span style={{
            fontSize:isRetro?9:15, fontWeight:700,
            fontFamily:isRetro?font:"'Space Grotesk',sans-serif",
            color:isRetro?'#00ff41':textMain,
            textShadow:isRetro?'0 0 10px #00ff41':'none', letterSpacing:isRetro?1:0,
          }}>{isRetro?'⚡ ':''}INCIDENT VIEW</span>

          <ClockBar startMs={activeInc?.createdAt} compact={false} />

          {activeInc&&<>
            <span style={{color:textDim,fontSize:isRetro?7:12}}>—</span>
            <span style={{fontSize:isRetro?8:13,color:isRetro?'#ffcc00':dark?'#a29bfe':'#5b4fd4',fontWeight:600}}>
              {activeInc.name}
            </span>
            <span style={{fontSize:isRetro?5:9,color:textDim}}>
              created {fmtTs(activeInc.createdAt)}
            </span>
          </>}
        </div>

        {/* Summary pills */}
        {activeInc&&(
          <div style={{display:'flex',gap:6}}>
            {[
              {l:'TODO',    n:todoCards.length,    c:isRetro?'#00aaff':dark?'#63b3ed':'#2b6cb0'},
              {l:'IN PROG', n:ipCards.length,      c:isRetro?'#ffcc00':dark?'#f6ad55':'#c2410c'},
              {l:'HOLD',    n:blockedCards.length,  c:isRetro?'#ff4444':dark?'#fc8181':'#c53030'},
              {l:'DONE',    n:doneCards.length,    c:isRetro?'#33ff66':dark?'#68d391':'#15803d'},
            ].map(s=>(
              <span key={s.l} style={{
                fontSize:isRetro?5:9, color:s.c, fontWeight:700,
                background:isRetro?'#0e0e28':dark?'#1a1a38':'#f0f0fc',
                border:isRetro?`1px solid ${s.c}`:`1px solid ${dark?'#2a2a4a':'#d0d0e8'}`,
                borderRadius:isRetro?0:10, padding:'2px 8px',
              }}>{s.l}:{s.n}</span>
            ))}
          </div>
        )}

        {/* Playbook loader */}
        {activeInc&&(
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:isRetro?5:9,color:textDim}}>
              {activeInc.playbookId
                ? (matrix.playbooks||[]).find(p=>p.id===activeInc.playbookId)?.name

            </span>
            <select value="" onChange={e=>{if(e.target.value)loadPlaybook(e.target.value);}}

                background:isRetro?'#0a0a1e':dark?'#1a1a3a':'#f0f0f8',

        <button onClick={exportIncident} style={btn(true)}>Export JSON ↓</button>
      </div>

      {/* ── BODY ── */}

                  border:isRetro?'2px solid #00ff41':`1px solid ${dark?'#3a3a6a':'#c4b5fd'}`,
                  borderRadius:isRetro?0:4, color:isRetro?'#00ff41':'#7c6ff7',

                  borderRadius:isRetro?0:4, color:isRetro?'#00aa2a':'#7c6ff7',
                  width:22,height:22,cursor:'pointer',fontSize:12,
                  display:'flex',alignItems:'center',justifyContent:'center',
                }}>‹</button>
              </div>
            </div>

            {/* Incident list */}
            <div style={{flex:1,overflowY:'auto',padding:'8px'}}>
              {incidents.map(inc=>{
                const isAct = inc.id===activeId;
                const todo    = inc.cards.filter(c=>c.status==='todo').length;
                const ip      = inc.cards.filter(c=>c.status==='inprogress').length;
                const blocked = inc.cards.filter(c=>c.status==='blocked').length;
                const done    = inc.cards.filter(c=>c.status==='completed').length;
                return (
                  <div key={inc.id} onClick={()=>setActiveId(inc.id)} className="pb-card"
                    style={{
                      background:isAct?(isRetro?'#111130':dark?'#1a1a38':'#ede9fe'):'transparent',
                      border:isAct
                        ?(isRetro?'2px solid #00ff41':`1px solid ${dark?'#4a4a8a':'#a78bfa'}`)
                        :(isRetro?'1px solid #003308':`1px solid ${dark?'#1e1e38':'#e0e0f0'}`),
                      borderRadius:isRetro?0:6, padding:'10px', marginBottom:6,
                      cursor:'pointer', position:'relative',
                      boxShadow:isAct&&isRetro?'3px 3px 0 #00ff41':'none',
                    }}>
                    {/* Name row */}
                    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:4,marginBottom:4}}>
                      {editingIncId===inc.id ? (
                        <input value={editIncName}
                          onChange={e=>setEditIncName(e.target.value)}
                          onBlur={()=>{
                            if(editIncName.trim()) setIncidents(p=>p.map(i=>i.id===inc.id?{...i,name:editIncName.trim()}:i));
                            setEditingIncId(null);
                          }}
                          onKeyDown={e=>{
                            if(e.key==='Enter')e.target.blur();
                            if(e.key==='Escape')setEditingIncId(null);
                          }}
                          autoFocus
                          onClick={e=>e.stopPropagation()}
                          style={{
                            flex:1,background:'transparent',border:'none',
                            borderBottom:isRetro?'1px solid #00ff41':`1px solid ${dark?'#4a4a8a':'#a78bfa'}`,
                            color:textMain,fontFamily:font,fontSize:isRetro?7:11,outline:'none',padding:'1px 0',
                          }}/>
                      ) : (
                        <span

                        </span>
                      )}
                      <button onClick={e=>{e.stopPropagation();deleteIncident(inc.id);}}
                        onMouseEnter={e=>e.currentTarget.style.color='#e94560'}
                        onMouseLeave={e=>e.currentTarget.style.color='#e9456055'}
                        style={{background:'none',border:'none',color:'#e9456055',cursor:'pointer',fontSize:13,lineHeight:1,padding:0,flexShrink:0}}>×</button>
                    </div>

                    {/* Progress stats */}
                    <div style={{display:'flex',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                      {[{l:'TODO',n:todo,c:'#63b3ed'},{l:'PROG',n:ip,c:'#f6ad55'},{l:'HOLD',n:blocked,c:'#fc8181'},{l:'DONE',n:done,c:'#68d391'}].map(s=>(

                          fontSize:isRetro?5:8,
                          background:isRetro?'#0e0e28':dark?'#1a1a38':'#ede9fe',
                          border:isRetro?'1px solid #4444aa':`1px solid ${dark?'#3a3a6a':'#c4b5fd'}`,
                          borderRadius:isRetro?0:8, padding:'1px 6px',
                          color:isRetro?'#8888ff':dark?'#a29bfe':'#5b4fd4',

                        </span>

                    {/* Elapsed since created */}
                    <div style={{fontSize:isRetro?5:9,color:textDim}}>
                      ⏱ {fmtElapsed(inc.createdAt,now)} elapsed
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          /* Collapsed sidebar tab */
          <div onClick={()=>setSidebarOpen(true)} style={{
            width:28, flexShrink:0, cursor:'pointer',
            background:sidebarBg,
            borderRight:isRetro?'2px solid #00ff41':`1px solid ${border}`,
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:8,
          }}>
            <span style={{fontSize:isRetro?5:9,color:isRetro?'#00ff41':'#7c6ff7',
              writingMode:'vertical-rl',transform:'rotate(180deg)',letterSpacing:2,opacity:.8}}>INCIDENTS</span>
            <span style={{fontSize:12,color:isRetro?'#00ff41':'#7c6ff7'}}>›</span>
          </div>
        )}

        {/* ── KANBAN BOARD ── */}
        <div style={{flex:1,display:'flex',gap:12,padding:'14px',overflowX:'auto',overflowY:'hidden'}}>
          {COLS.map(col=>{
            const colCards = (activeInc?.cards||[]).filter(c=>c.status===col.status);
            const groups   = groupCards(colCards);

            return (
              <div key={col.status} style={{

                {/* Column header */}
                <div style={{
                  padding:'10px 14px', flexShrink:0,
                  background:isRetro?'#0a0a1e':dark?'#0e0e20':'#f0f0fc',
                  borderBottom:isRetro?`2px solid ${col.color}`:`1px solid ${border}`,

                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    {isRetro&&<span style={{color:col.color,fontSize:10}}>▐</span>}
                    <span style={{
                      fontSize:isRetro?8:11, fontWeight:700, letterSpacing:isRetro?1:2,
                      color:col.color, textShadow:isRetro?`0 0 8px ${col.color}`:'none',

                    {isRetro&&<span style={{color:col.color,fontSize:10}}>▌</span>}
                  </div>

                    fontSize:isRetro?7:10, fontWeight:700, color:col.color,
                    background:isRetro?'#0e0e28':dark?'#1a1a38':'#eeeefc',
                    border:isRetro?`1px solid ${col.color}`:`1px solid ${dark?'#2a2a4a':'#d0d0e8'}`,

                <div style={{flex:1,overflowY:'auto',padding:'10px 10px 6px'}}>
                  {groups.length===0&&(
                    <div style={{textAlign:'center',padding:'28px 10px',color:textDim,fontSize:isRetro?6:10,lineHeight:2}}>

                  )}
                  {groups.map(({tactic,cards})=>{
                    const ph         = PHASE_COLORS[tactic.shortcode]||PHASE_COLORS.AD;

                      <div key={tactic.id} style={{marginBottom:isCollapsed?6:14}}>
                        {/* Phase group header — clickable to collapse */}

                          onClick={()=>toggleGroup(groupKey)}
                          style={{
                            display:'flex', alignItems:'center', gap:6,
                            marginBottom:isCollapsed?0:6, paddingBottom:5,
                            borderBottom:isRetro?`1px solid ${ph.border}44`:`1px solid ${border2}`,
                            cursor:'pointer', userSelect:'none',
                          }}>
                          {/* Chevron */}
                          <span style={{
                            fontSize:isRetro?7:10, color:ph.text, opacity:.7,
                            transform:isCollapsed?'rotate(-90deg)':'rotate(0deg)',
                            display:'inline-block', transition:isRetro?'none':'transform .15s',
                            flexShrink:0, lineHeight:1,

                          <span style={{
                            fontSize:isRetro?6:9, fontWeight:700, letterSpacing:isRetro?1:2,
                            textTransform:'uppercase', background:ph.bg, color:ph.text,

                            borderRadius:isRetro?0:3, padding:'2px 7px', flexShrink:0,

                            fontSize:isRetro?5:9, color:isCollapsed?ph.text:textDim,

                      </div>

                  })}
                </div>

                  <div style={{padding:'8px 10px',borderTop:isRetro?'1px solid #006618':`1px solid ${border}`,flexShrink:0}}>

                      border:isRetro?'1px dashed #00ff41':`1px dashed ${dark?'#3a3a6a':'#c4b5fd'}`,
                      borderRadius:isRetro?0:6,
                      color:isRetro?'#00ff41':dark?'#7c6ff7':'#5b4fd4',

          })}
