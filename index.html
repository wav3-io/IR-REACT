                  background:isRetro?'#0a0a0e':dark?'#0e0e20':'#f0f0fc',
                  borderBottom:isRetro?`2px solid ${col.color}`:`1px solid ${border}`,
                  display:'flex', alignItems:'center', justifyContent:'space-between',
                  boxShadow:isRetro?'0 3px 0 #000':'none',
                }}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    {isRetro&&<span style={{color:col.color,fontSize:10}}>▐</span>}
                    <span style={{
                      fontSize:12, fontWeight:700, letterSpacing:1,
                      color:col.color, textShadow:isRetro?`0 0 8px ${col.color}`:'none',
                    }}>{col.label}</span>
                    {isRetro&&<span style={{color:col.color,fontSize:10}}>▌</span>}
                  </div>
                  <span style={{
                    fontSize:10, fontWeight:700, color:col.color,
                    background:isRetro?'#131318':dark?'#1a1a38':'#eeeefc',
                    border:isRetro?`1px solid ${col.color}`:`1px solid ${dark?'#2a2a4a':'#d0d0e8'}`,
                    borderRadius:isRetro?10:10, padding:'2px 8px',
                  }}>{colCards.length}</span>
                </div>

                {/* Column body */}
                <div style={{flex:1,overflowY:'auto',padding:'10px 10px 6px'}}>
                  {groups.length===0&&(
                    <div style={{textAlign:'center',padding:'28px 10px',color:textDim,fontSize:10,lineHeight:2}}>
                      {col.status==='todo'?'Load a playbook\nor add actions below':'No actions yet'}
                    </div>
                  )}
                  {groups.map(({tactic,cards})=>{
                    const ph         = PHASE_COLORS[tactic.shortcode]||PHASE_COLORS.AD;
                    const groupKey   = `${col.status}-${tactic.id}`;
                    const isCollapsed= collapsedGroups.has(groupKey);
                    return (
                      <div key={tactic.id} style={{marginBottom:isCollapsed?6:14}}>
                        {/* Phase group header — clickable to collapse */}
                        <div
                          onClick={()=>toggleGroup(groupKey)}
                          style={{
                            display:'flex', alignItems:'center', gap:6,
                            marginBottom:isCollapsed?0:6, paddingBottom:5,
                            borderBottom:isRetro?`1px solid ${ph.border}44`:`1px solid ${border2}`,
                            cursor:'pointer', userSelect:'none',
                          }}>
                          {/* Chevron */}
                          <span style={{
                            fontSize:10, color:ph.text, opacity:.7,
                            transform:isCollapsed?'rotate(-90deg)':'rotate(0deg)',
                            display:'inline-block', transition:isRetro?'none':'transform .15s',
                            flexShrink:0, lineHeight:1,
                          }}>▾</span>
                          <span style={{
                            fontSize:9, fontWeight:700, letterSpacing:2,
                            textTransform:'uppercase', background:ph.bg, color:ph.text,
                            border:isRetro?`1px solid ${ph.border}`:'none',
                            borderRadius:isRetro?0:3, padding:'2px 7px', flexShrink:0,
                          }}>{tactic.shortcode}</span>
                          <span style={{fontSize:10,color:ph.text,opacity:.8}}>{tactic.name}</span>
                          <span style={{
                            fontSize:9, color:isCollapsed?ph.text:textDim,
                            marginLeft:'auto', fontWeight:isCollapsed?700:400,
                          }}>{cards.length}</span>
                        </div>
                        {/* Cards — hidden when collapsed */}
                        {!isCollapsed && cards.map(card=>(
                          <KanbanCard
                            key={card.id} card={card}
                            colStatus={col.status} colColor={col.color} colLabel={col.label}
                            phaseColor={ph} now={now} dark={dark} isRetro={isRetro} font={font}
                            getCat={getCat} textMain={textMain} textSub={textSub} textDim={textDim}
                            border={border} border2={border2} cardBg={cardBg}
                            onMove={moveCard} onOwner={setOwnerFn} onNotes={setNotesFn} onImages={setImagesFn} onRemove={removeCard}
                          />
                        ))}
                      </div>
                    );
                  })}
                </div>

                {/* Add action button — To Do only */}
                {col.status==='todo'&&(
                  <div style={{padding:'8px 10px',borderTop:isRetro?'1px solid #5a2a4a':`1px solid ${border}`,flexShrink:0}}>
                    <button onClick={()=>setShowAdd(true)} style={{
                      width:'100%', background:'transparent',
                      border:isRetro?'1px dashed #c84b9e':`1px dashed ${dark?'#3a3a6a':'#c4b5fd'}`,
                      borderRadius:isRetro?6:6,
                      color:isRetro?'#f0eeea':dark?'#7c6ff7':'#5b4fd4',
                      padding:'8px', cursor:'pointer', fontFamily:font,
                      fontSize:11, letterSpacing:.5,
                    }}>+ Add Action</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── ADD ACTION MODAL ── */}
      {showAdd&&(
        <IncidentAddModal
          allIcerTechs={allIcerTechs} activeInc={activeInc}
          dark={dark} isRetro={isRetro} font={font}
          textMain={textMain} textSub={textSub} textDim={textDim}
          border={border} PHASE_COLORS={PHASE_COLORS}
          categories={categories} getCat={getCat}
          onAdd={addCard} onClose={()=>setShowAdd(false)}
        />
      )}
    </div>
  );
}

// ── Main App ──
function App({initialMatrix, initialName}) {
  const [theme,         setTheme]         = useState("dark");
  const [matrix,        setMatrix]        = useState({...initialMatrix, playbooks:initialMatrix.playbooks||[], categories:initialMatrix.categories||DEFAULT_CATEGORIES});
  const [selected,      setSelected]      = useState(null);
  const [editTactic,    setEditTactic]    = useState(null);
  const [showAddTactic, setShowAddTactic] = useState(false);
  const [showAddAction, setShowAddAction] = useState(false);
  const [showAddPb,     setShowAddPb]     = useState(false);
  const [showManageCat, setShowManageCat] = useState(false);
  const [hoveredCell,   setHoveredCell]   = useState(null);
  const [expandedCards, setExpandedCards] = useState({});
  const [hoveredTactic, setHoveredTactic] = useState(null);
  const [matrixName,    setMatrixName]    = useState(initialName||"Incident Response — PICERL");
  const [editingName,   setEditingName]   = useState(false);
  const [filterCat,     setFilterCat]     = useState(null);
  const [activePlaybook,setActivePlaybook]= useState(null);
  const [pbMode,        setPbMode]        = useState(null);
  const [panelOpen,     setPanelOpen]     = useState(true);
  const [showGuide,     setShowGuide]     = useState(null); // playbook id for guide view
  const [showIncident,  setShowIncident]  = useState(false);
  const LS_TIMER = 'ir_navigator_timer';
  const [timerStart, setTimerStart] = useState(() => {
    try {
      const saved = localStorage.getItem(LS_TIMER);
      if (saved) return parseInt(saved, 10);
    } catch(e) {}
    return null;
  });
  const fileRef = useRef();

  function startTimer() {
    const t = Date.now();
    setTimerStart(t);
    try { localStorage.setItem(LS_TIMER, String(t)); } catch(e) {}
  }
  function stopTimer() {
    setTimerStart(null);
    try { localStorage.removeItem(LS_TIMER); } catch(e) {}
  }

  const dark = theme !== "light";

  // Apply theme to html element
  useEffect(()=>{ document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  // Escape key to close guide overlay
  useEffect(()=>{
    const handler = e => { if(e.key==="Escape"){ if(showGuide) setShowGuide(null); else setExpandedCards({}); } };
    window.addEventListener("keydown",handler);
    return ()=>window.removeEventListener("keydown",handler);
  }, [showGuide]);

  const categories   = matrix.categories || DEFAULT_CATEGORIES;
  const getCat       = id => categories.find(c=>c.id===id)||categories[0];
  const activePb     = (matrix.playbooks||[]).find(p=>p.id===activePlaybook)||null;
  const selectedTech = selected ? matrix.tactics.find(t=>t.id===selected.tacticId)?.techniques.find(te=>te.id===selected.techId) : null;

  const TACTIC_ACCENTS = theme==="goose" ? TACTIC_ACCENTS_GOOSE : theme==="corporate" ? TACTIC_ACCENTS_CORPORATE : dark ? TACTIC_ACCENTS_DARK : TACTIC_ACCENTS_LIGHT;
  const DEF_ACCENT     = theme==="goose" ? DEF_ACCENT_GOOSE : theme==="corporate" ? DEF_ACCENT_CORPORATE : dark ? DEF_ACCENT_DARK : DEF_ACCENT_LIGHT;

  // ── Playbook fns ──
  function selectPlaybook(pbId) { setActivePlaybook(pbId); setPbMode("view"); setSelected(null); }
  function deselectPlaybook()   { setActivePlaybook(null); setPbMode(null); }
  function addPlaybook(name,color,description) { setMatrix(m=>({...m,playbooks:[...(m.playbooks||[]),{id:uid(),name,color,description:description||"",techIds:[]}]})); setShowAddPb(false); }
  function deletePlaybook(pbId)    { setMatrix(m=>({...m,playbooks:(m.playbooks||[]).filter(p=>p.id!==pbId)})); if(activePlaybook===pbId) deselectPlaybook(); }
  function renamePlaybook(pbId,name) { setMatrix(m=>({...m,playbooks:(m.playbooks||[]).map(p=>p.id!==pbId?p:{...p,name})})); }
  function updatePlaybookDesc(pbId,description) { setMatrix(m=>({...m,playbooks:(m.playbooks||[]).map(p=>p.id!==pbId?p:{...p,description})})); }
  function reorderPlaybook(pbId,dragId,targetId,pos) {
    setMatrix(m=>({...m,playbooks:(m.playbooks||[]).map(p=>{
      if(p.id!==pbId) return p;
      const ids=p.techIds.filter(id=>id!==dragId), at=ids.indexOf(targetId);
      if(at===-1) return p;
      const out=[...ids]; out.splice(pos==="above"?at:at+1,0,dragId);
      return {...p,techIds:out};
    })}));
  }
  function toggleTechInPlaybook(pbId,techId) {
    setMatrix(m=>({...m,playbooks:(m.playbooks||[]).map(p=>{
      if(p.id!==pbId) return p;
      const has=p.techIds.includes(techId);
      return {...p,techIds:has?p.techIds.filter(id=>id!==techId):[...p.techIds,techId]};
    })}));
  }

  // ── Matrix fns ──
  function updateTech(tacticId,techId,updates) { setMatrix(m=>({...m,tactics:m.tactics.map(t=>t.id!==tacticId?t:{...t,techniques:t.techniques.map(te=>te.id!==techId?te:{...te,...updates})})})); }
  function updateTactic(tacticId,updates)      { setMatrix(m=>({...m,tactics:m.tactics.map(t=>t.id!==tacticId?t:{...t,...updates})})); }
  function deleteTech(tacticId,techId) {
    setMatrix(m=>({...m,
      tactics:  m.tactics.map(t=>t.id!==tacticId?t:{...t,techniques:t.techniques.filter(te=>te.id!==techId)}),
      playbooks:(m.playbooks||[]).map(p=>({...p,techIds:p.techIds.filter(id=>id!==techId)})),
    }));
  }
  function deleteTactic(tacticId)    { setMatrix(m=>({...m,tactics:m.tactics.filter(t=>t.id!==tacticId)})); }
  function addTactic(name,url)       { setMatrix(m=>({...m,tactics:[...m.tactics,{id:uid(),name,url,techniques:[]}]})); setShowAddTactic(false); }
  function addAction(tacticId,id,name,url,description) { setMatrix(m=>({...m,tactics:m.tactics.map(t=>t.id!==tacticId?t:{...t,techniques:[...t.techniques,{id,name,url,description:description||"",category:"",comment:""}]})})); setShowAddAction(false); }

  // ── Category fns ──
  function addCategory(label,color,bg,text) {
    const id=label.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    if(categories.find(c=>c.id===id)) return;
    setMatrix(m=>({...m,categories:[...(m.categories||DEFAULT_CATEGORIES),{id,label,color,bg,text}]}));
  }
  function deleteCategory(catId) {
    if(catId==="") return; // "Uncategorized" is the fallback, never delete it
    setMatrix(m=>({...m,
      categories:(m.categories||DEFAULT_CATEGORIES).filter(c=>c.id!==catId),
      tactics:m.tactics.map(t=>({...t,techniques:t.techniques.map(te=>te.category===catId?{...te,category:""}:te)})),
    }));
    if(filterCat===catId) setFilterCat(null);
  }

  // ── Click routing ──
  function handleTechClick(tacticId,tech) {
    if(activePb) {
      if(pbMode==="edit") { toggleTechInPlaybook(activePlaybook,tech.id); return; }
      if(pbMode==="view"&&activePb.techIds.includes(tech.id)&&tech.url) openLink(tech.url);
      return;
    }
    const key=tacticId+"-"+tech.id;
    setExpandedCards(e=>({...e,[key]:!e[key]}));
  }
  function handleTacticClick(tactic) {
    if(activePb) return;
    if(tactic.url) openLink(tactic.url);
    else setEditTactic(tactic);
  }

  // ── Export / Import ──
  function exportSnapshot() { exportHTML({...matrix},matrixName); }
  function importFile(e) {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const match=ev.target.result.match(/<script id="matrix-data"[^>]*>([\s\S]*?)<\/script>/);
        if(match){ const d=JSON.parse(match[1]); setMatrix({...d,playbooks:d.playbooks||[],categories:d.categories||DEFAULT_CATEGORIES}); setMatrixName(d.name||"Imported"); }
        else alert("Could not find matrix data in this file.");
      } catch { alert("Failed to parse the file."); }
    };
    reader.readAsText(file); e.target.value="";
  }
  function clearAll() {
    setMatrix(m=>({...m,
      tactics:  m.tactics.map(t=>({...t,techniques:t.techniques.map(te=>({...te,category:"",comment:""}))})),
      playbooks:(m.playbooks||[]).map(p=>({...p,techIds:[]})),
    }));
  }

  // ── Stats ──
  const totalTechs       = matrix.tactics.reduce((s,t)=>s+t.techniques.length,0);
  const categorizedTechs = matrix.tactics.reduce((s,t)=>s+t.techniques.filter(te=>te.category).length,0);
  const linkedTechs      = matrix.tactics.reduce((s,t)=>s+t.techniques.filter(te=>te.url).length,0);
  const linkedPhases     = matrix.tactics.filter(t=>t.url).length;
  const catCounts        = categories.slice(1).map(c=>({...c,count:matrix.tactics.reduce((s,t)=>s+t.techniques.filter(te=>te.category===c.id).length,0)})).filter(c=>c.count>0);

  // ── Theme colors (read from CSS variables so all 4 themes work) ──
  const getVar = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const [themeColors, setThemeColors] = useState({});
  useEffect(()=>{
    // Small delay to let CSS apply
    requestAnimationFrame(()=>{
      setThemeColors({
        bg:       getVar('--bg'),
        headerBg: getVar('--header-bg'),
        bg2:      getVar('--bg2'),
        bg3:      getVar('--bg3'),
        surface:  getVar('--surface'),
        border:   getVar('--border'),
        border2:  getVar('--border2'),
        text:     getVar('--text'),
        text2:    getVar('--text2'),
        text3:    getVar('--text3'),
        text4:    getVar('--text4'),
        accent:   getVar('--accent'),
        accent2:  getVar('--accent2'),
        cellBg:   getVar('--cell-bg'),
        cellBorder:getVar('--cell-border'),
        inputBg:  getVar('--input-bg'),
        inputBorder:getVar('--input-border'),
        modalBg:  getVar('--modal-bg'),
      });
    });
  }, [theme]);
  const isRetro = theme==="goose";
  const retroFont = "'Inter',system-ui,sans-serif"; // goose uses normal font
  const bg        = themeColors.bg       || (dark?"#0e0e18":"#f0f0f8");
  const headerBg  = themeColors.headerBg || (dark?"#111120":"#ffffff");
  const barBg     = themeColors.bg2      || (dark?"#0c0c1a":"#e8e8f4");
  const hintBg    = isRetro?"#0a0a0e":dark?"#0a0a12":"#f0f0fa";
  const border    = themeColors.border   || (dark?"#1e1e38":"#d8d8f0");
  const border2   = themeColors.border2  || (dark?"#252545":"#c8c8e8");
  const textMain  = themeColors.text     || (dark?"#e8e8f0":"#1a1a2e");
  const textSub   = themeColors.text3    || (dark?"#8888aa":"#6060a0");
  const textDim   = themeColors.text4    || (dark?"#444460":"#b0b0cc");
  const cellBg    = themeColors.cellBg   || (dark?"#161628":"#ffffff");
  const cellBorderBase = themeColors.cellBorder || (dark?"#252545":"#d8d8f0");

  const S = getS(dark);

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:bg,fontFamily:"'Inter',system-ui,sans-serif",color:textMain,position:"relative"}}>
      {isRetro && <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,background:"radial-gradient(ellipse at top, rgba(200,75,158,0.06) 0%, transparent 70%)"}}/>}

      {/* ── HEADER ── */}
      <header style={{background:headerBg,borderBottom:isRetro?`1px solid #c84b9e`:`1px solid ${border}`,padding:"13px 22px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",flexShrink:0,boxShadow:isRetro?"none":dark?"none":"0 1px 8px rgba(0,0,0,.06)"}}>
        <div style={{flex:1,minWidth:220}}>
          {editingName ? (
            <input value={matrixName} onChange={e=>setMatrixName(e.target.value)} onBlur={()=>setEditingName(false)} onKeyDown={e=>e.key==="Enter"&&setEditingName(false)} autoFocus
              style={{fontSize:18,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,background:"transparent",border:"none",borderBottom:"2px solid #7c6ff7",color:textMain,outline:"none",padding:"2px 0",minWidth:280}}/>
          ) : (
            <h1 onClick={()=>setEditingName(true)} title="Click to rename"
              style={{margin:0,fontSize:18,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:isRetro?"#f0eeea":textMain,cursor:"text",letterSpacing:.3,textShadow:isRetro?"0 0 10px rgba(200,75,158,.5)":"none"}}>
              {matrixName}{isRetro?" ◄":""}
            </h1>
          )}
          <div style={{fontSize:12,color:textDim,marginTop:4,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
            <span>{categorizedTechs}/{totalTechs} categorized</span>
            <span style={{opacity:.4}}>·</span>
            <span>{matrix.tactics.length} phases</span>
            <span style={{opacity:.4}}>·</span>
            <span style={{display:"flex",alignItems:"center",gap:4,color:linkedTechs>0?(dark?"#63b3ed":"#2b6cb0"):textDim}}>
              <LinkIcon color={linkedTechs>0?(dark?"#63b3ed":"#2b6cb0"):textDim} size={10}/>
              {linkedPhases} phase · {linkedTechs} action links
            </span>
            {activePb&&(
              <span style={{display:"flex",alignItems:"center",gap:5,color:activePb.color,background:`${activePb.color}18`,border:`1px solid ${activePb.color}44`,borderRadius:12,padding:"1px 9px"}}>
                {pbMode==="edit"
                  ?<><div className="rec-dot" style={{width:5,height:5,borderRadius:"50%",background:activePb.color}}/> Editing: {activePb.name}</>
                  :<><EyeIcon color={activePb.color} size={10}/> Viewing: {activePb.name}</>
                }
              </span>
            )}
            {catCounts.map(c=>(
              <span key={c.id} style={{color:c.text,display:"flex",alignItems:"center",gap:3}}>
                <span style={{opacity:.3}}>·</span>{c.count} {c.label}
              </span>
            ))}
          </div>
        </div>

        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <ClockBar timerStart={timerStart} onTimerStart={startTimer} onTimerStop={stopTimer} compact={true} />
          {/* Theme toggle */}
          {(()=>{
            const themes = ["dark","light","tactical","midnight","corporate","goose"];
            const labels = {dark:"Dark",light:"Light",tactical:"Tactical",midnight:"Midnight",corporate:"Corporate",goose:"Goose"};
            const nextTheme = themes[(themes.indexOf(theme)+1)%themes.length];
            return (
              <button className="theme-toggle" onClick={()=>setTheme(nextTheme)}
                title={`Theme: ${labels[theme]} → ${labels[nextTheme]}`}
                style={{background:theme==="goose"?"#0a0a0e":dark?"#1a1a3a":"#ede9fe",border:theme==="goose"?"1px solid #c84b9e":`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:7,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:5,padding:"0 10px"}}>
                {theme==="dark"      ? <MoonIcon color="#a29bfe" size={15}/>
                 : theme==="light"     ? <SunIcon  color="#f6ad55" size={15}/>
                 : theme==="tactical"  ? <span style={{fontSize:14,lineHeight:1}}>🛡️</span>

          disabled={filterCat===null}
          title="Clear category filter"
          onMouseEnter={e=>{if(filterCat!==null){e.currentTarget.style.background="#e94560";e.currentTarget.style.color="#fff";}}}
          onMouseLeave={e=>{if(filterCat!==null){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#e94560";}}}
          style={{display:"flex",alignItems:"center",gap:4,background:"transparent",border:`1px solid #e94560`,borderRadius:20,padding:"3px 10px",cursor:filterCat===null?"default":"pointer",fontFamily:"inherit",color:"#e94560",fontSize:11,transition:"all .15s",opacity:filterCat===null?.35:1,marginRight:2}}>
          ✕ Clear
        </button>
        {categories.map(cat=>{
          const on = filterCat===cat.id;
          const isCustom = !DEFAULT_CATEGORIES.find(d=>d.id===cat.id);
          return (
            <div key={cat.id} className="cat-pill-wrap" style={{display:"flex",alignItems:"center",position:"relative",opacity:filterCat!==null&&!on?.4:1}}>
              <button onClick={()=>setFilterCat(on?null:cat.id)}
                style={{display:"flex",alignItems:"center",gap:5,background:on?cat.bg:"transparent",border:`1px solid ${on?cat.color:dark?"#2a2a48":"#d0d0e8"}`,borderRadius:20,padding:isCustom?"3px 22px 3px 10px":"3px 10px",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:on?cat.text:dark?"#4a4a70":"#b0b0cc",flexShrink:0}}/>
                <span style={{fontSize:12,color:on?cat.text:textSub}}>{cat.label}</span>
              </button>
              {isCustom&&(
                <button onClick={e=>{e.stopPropagation();deleteCategory(cat.id);}}
                  onMouseEnter={e=>e.currentTarget.style.color="#e94560"}
                  onMouseLeave={e=>e.currentTarget.style.color="#e9456055"}
                  style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#e9456055",cursor:"pointer",fontSize:12,lineHeight:1,padding:0,transition:"color .15s"}} title="Delete">×</button>
              )}
            </div>
          );
        })}

        </button>

        <span style={{fontSize:11,color:isRetro?"#c84b9e":textDim,display:"flex",alignItems:"center",gap:5}}>
          {activePb&&pbMode==="view"&&<><EyeIcon color={activePb.color+"aa"} size={9}/><span style={{color:activePb.color+"bb"}}>View — highlighted actions open their link on click</span></>}
          {activePb&&pbMode==="edit"&&<><div className="rec-dot" style={{width:5,height:5,borderRadius:"50%",background:activePb.color,flexShrink:0}}/><span style={{color:activePb.color+"bb"}}>Edit — click any action to add/remove from <strong style={{color:activePb.color}}>{activePb.name}</strong></span></>}
          {!activePb&&<><LinkIcon color={textDim} size={9}/> Phase/action with link → opens URL · No link → click to edit</>}
        </span>
        <span style={{fontSize:10,color:textDim}}>Export → <span style={{color:dark?"#5555aa":"#8888cc"}}>index_YYYYMMDD_HHMMSS.html</span></span>
      </div>

        {/* MATRIX */}

            {matrix.tactics.map((tactic,idx)=>{
              const accent = TACTIC_ACCENTS[tactic.id]||DEF_ACCENT;
              const catOrder = categories.map(c=>c.id);
              const sortByCat = list => [...list].sort((a,b)=>{
                const ai = catOrder.indexOf(a.category||"");
                const bi = catOrder.indexOf(b.category||"");
                return (ai===-1?999:ai) - (bi===-1?999:bi);
              });
              const techs  = sortByCat(filterCat!==null ? tactic.techniques.filter(te=>(te.category||"")===filterCat) : tactic.techniques);

              return (
                <div key={tactic.id} className="tactic-wrap" style={{width:175,flexShrink:0}}>

                  {/* Phase header */}
                  <div className="tactic-header"
                    onClick={()=>handleTacticClick(tactic)}
                    onMouseEnter={()=>setHoveredTactic(tactic.id)}
                    onMouseLeave={()=>setHoveredTactic(null)}
                    style={{background:isRetro?accent.from:`linear-gradient(150deg,${accent.from},${accent.to})`,borderRadius:10,padding:"12px 14px",marginBottom:8,border:isRetro?`2px solid ${accent.border}`:`1px solid ${tactic.url?accent.text+"66":accent.border}`,position:"relative",boxShadow:isRetro?`4px 4px 0 #000`:dark?(tactic.url?`0 4px 24px ${accent.text}22`:`0 4px 18px ${accent.border}22`):(tactic.url?`0 4px 16px ${accent.text}33`:`0 2px 8px ${accent.border}22`)}}>
                    <div style={{fontSize:9,color:accent.text,opacity:.6,letterSpacing:3,marginBottom:4,textTransform:"uppercase"}}>{isRetro?"★ ":""}Phase {idx+1}</div>
                    <div style={{fontSize:13,fontWeight:700,color:accent.text,fontFamily:"'Space Grotesk',sans-serif",lineHeight:1.25,paddingRight:18,textShadow:isRetro?`0 0 6px ${accent.text}`:"none"}}>{tactic.name}</div>
                    <div style={{fontSize:11,color:dark?"#44446088":"#88889088",marginTop:4,display:"flex",alignItems:"center",gap:5}}>
                      <span>{filterCat!==null?`${techs.length}/${tactic.techniques.length}`:tactic.techniques.length} actions</span>
                      {tactic.url&&<span style={{display:"flex",alignItems:"center",gap:3,color:accent.text,opacity:.6}}>· <LinkIcon color={accent.text} size={9}/></span>}
                    </div>
                    {hoveredTactic===tactic.id&&!tactic.url&&!activePb&&(
                      <div style={{position:"absolute",top:9,right:28,fontSize:11,color:accent.text,opacity:.5}}>✎</div>
                    )}
                    <button className="tactic-del" onClick={e=>{e.stopPropagation();deleteTactic(tactic.id);}} style={{position:"absolute",top:9,right:9,background:"transparent",border:"none",color:"#e94560",cursor:"pointer",fontSize:16,padding:2,lineHeight:1}}>×</button>
                  </div>

                  {/* Action cells */}
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {techs.map(tech=>{
                      const cat       = getCat(tech.category);
                      const isHov     = hoveredCell===`${tactic.id}-${tech.id}`;
                      const hasLink   = !!tech.url;
                      const inPb      = activePb&&activePb.techIds.includes(tech.id);
                      const isDimmed  = activePb&&!inPb;
                      if(isDimmed&&pbMode==="view") return null;
                      const memberPbs = (matrix.playbooks||[]).filter(p=>p.id!==activePlaybook&&p.techIds.includes(tech.id));
                      const cardKey = `${tactic.id}-${tech.id}`;
                      const isExpanded = expandedCards[cardKey];
                      const hasContent = tech.description || (tech.sections?.length>0) || (tech.comment&&!tech.sections);

                      let cls="tech-cell";
                      if(isDimmed)                    cls+=" dimmed";
                      if(isDimmed&&pbMode==="view")   cls+=" view-mode-dim";
                      if(inPb)                        cls+=" in-playbook";
                      if(inPb&&pbMode==="view")       cls+=" view-mode";
                      if(pbMode==="edit")             cls+=" edit-mode-cell";

                      const catBg = tech.category ? cat.bg : cellBg;
                      const catBorder = inPb
                        ? activePb.color+"cc"
                        : hasLink
                          ? (tech.category?cat.color+"aa":(dark?"#4a4a80":"#b0b0d8"))
                          : (tech.category?cat.color:cellBorderBase);

                      return (
                        <div key={tech.id} className={cls}
                          style={{
                            "--pb-color": activePb?.color||"#7c6ff7",
                            background: catBg,
                            border: `1px solid ${catBorder}`,
                            borderRadius:8, padding:"9px 11px",
                            cursor: pbMode==="edit"?"crosshair":"pointer",
                            position:"relative",
                            boxShadow: inPb
                              ? `0 0 14px ${activePb.color}44`
                              : hasLink
                                ? `0 2px 10px ${tech.category?cat.color+"33":(dark?"#3a3a7033":"#b0b0d033")}`
                                : tech.category
                                  ? `0 1px 6px ${cat.color}22`
                                  : dark?"none":"0 1px 3px rgba(0,0,0,.06)",
                          }}
                          onClick={()=>handleTechClick(tactic.id,tech)}
                          onMouseEnter={()=>{ if(!isDimmed||pbMode==="edit") setHoveredCell(`${tactic.id}-${tech.id}`); }}
                          onMouseLeave={()=>setHoveredCell(null)}
                        >
                          {/* ID row */}
                          <div style={{fontSize:10,color:isRetro?"#c84b9e":dark?"#3a3a58":"#c0c0d8",marginBottom:3,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span>{isRetro?"▸ ":""}{tech.id}</span>
                            <div style={{display:"flex",alignItems:"center",gap:3}}>
                              {memberPbs.map(p=><div key={p.id} style={{width:5,height:5,borderRadius:"50%",background:p.color}} title={p.name}/>)}
                              {hasLink&&!activePb&&<a href={tech.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center"}} title={tech.url}><LinkIcon color={tech.category?cat.text:(dark?"#5a5a90":"#b0b0d0")} size={9}/></a>}
                              {inPb&&pbMode==="view"&&hasLink&&<a href={tech.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center"}} title={tech.url}><LinkIcon color={activePb.color} size={9}/></a>}
                            </div>
                          </div>
                          {/* Name */}
                          <div style={{fontSize:13,fontWeight:500,color:inPb?(isRetro?"#ffcc00":textMain):(tech.category?cat.text:(hasLink?(dark?"#b0b0d8":"#4040a0"):(dark?"#9090b8":"#5050a0"))),lineHeight:1.35}}>
                            {tech.name}
                          </div>
                          {/* Category badge */}
                          {tech.category&&(
                            <div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,background:`${cat.color}20`,border:isRetro?`1px solid ${cat.color}`:`1px solid ${cat.color}55`,borderRadius:isRetro?10:10,padding:"2px 7px"}}>
                              <div style={{width:isRetro?4:5,height:isRetro?4:5,borderRadius:isRetro?0:"50%",background:cat.text}}/>
                              <span style={{fontSize:10,color:cat.text,letterSpacing:.3}}>{cat.label}</span>
                            </div>
                          )}
                          {/* Expandable sections — shown when card is clicked */}
                          {isExpanded&&!inPb&&!activePb&&(
                            <div className="fade-in" style={{marginTop:8,borderTop:`1px solid ${dark?"#252545":"#e0e0f0"}`,paddingTop:6}} onClick={e=>e.stopPropagation()}>
                              {tech.description&&(
                                <div style={{fontSize:10,fontStyle:"italic",color:dark?"#666688":"#9090b0",lineHeight:1.4,marginBottom:6}}>
                                  {tech.description}
                                </div>
                              )}
                              {(tech.sections?.length>0?tech.sections:(tech.comment?[{id:"legacy",title:"Notes",body:tech.comment}]:[])).map(sec=>(
                                <SectionBlock key={sec.id} sec={sec} dark={dark}/>
                              ))}
                              {!tech.description&&!(tech.sections?.length>0)&&!tech.comment&&(
                                <div style={{fontSize:10,color:dark?"#444460":"#b0b0cc",fontStyle:"italic",opacity:.6}}>No details yet</div>
                              )}
                            </div>
                          )}
                          {/* In-playbook checkmark */}
                          {inPb&&(
                            <div style={{position:"absolute",top:6,right:6,width:15,height:15,borderRadius:"50%",background:activePb.color,display:"flex",alignItems:"center",justifyContent:"center"}}>
                              <span style={{color:"#fff",fontSize:9,fontWeight:700,lineHeight:1}}>✓</span>
                            </div>
                          )}
                          {/* Sections indicator dots — removed by design */}
                          {/* Edit/del */}
                          {isHov&&!activePb&&(
                            <div style={{position:"absolute",bottom:5,right:5,display:"flex",gap:4}}>
                              <button onClick={e=>{e.stopPropagation();setSelected({tacticId:tactic.id,techId:tech.id});}}
                                style={{background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:4,color:dark?"#a29bfe":"#5b4fd4",fontSize:9,padding:"1px 6px",cursor:"pointer",fontFamily:"inherit"}}>edit</button>
                              <button onClick={e=>{e.stopPropagation();deleteTech(tactic.id,tech.id);}}
                                style={{background:dark?"#e9456012":"#fff0f2",border:`1px solid ${dark?"#e9456045":"#fca5a5"}`,borderRadius:4,color:"#e94560",fontSize:9,padding:"1px 5px",cursor:"pointer",fontFamily:"inherit"}}>del</button>
                            </div>
                          )}
                        </div>
                      );
                    })}

                    {filterCat!==null&&techs.length===0&&(
                      <div style={{border:`1px dashed ${dark?"#1e1e38":"#d8d8f0"}`,borderRadius:8,padding:"16px 10px",textAlign:"center",color:textDim,fontSize:11}}>no match</div>
                    )}

                    {!activePb&&(
                      <button className="add-action-btn"
                        onClick={()=>setShowAddAction({preselect:tactic.id})}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor=accent.text;e.currentTarget.style.color=accent.text;}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor=dark?"#1e1e38":"#d8d8f0";e.currentTarget.style.color=textDim;}}
                        style={{background:"transparent",border:`1px dashed ${dark?"#1e1e38":"#d8d8f0"}`,borderRadius:8,padding:"8px",color:textDim,cursor:"pointer",fontSize:11,fontFamily:"inherit",transition:"all .15s"}}>
                        + add action
                      </button>
                    )}
                  </div>
                </div>
              );
            })}

            {/* Add Phase */}
            {!activePb&&(
              <div style={{width:140,flexShrink:0}}>
                <button onClick={()=>setShowAddTactic(true)}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="#7c6ff7";e.currentTarget.style.color="#7c6ff7";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=dark?"#1a1a30":"#d8d8f0";e.currentTarget.style.color=textDim;}}
                  style={{width:"100%",background:"transparent",border:`2px dashed ${dark?"#1a1a30":"#d8d8f0"}`,borderRadius:10,padding:"40px 10px",color:textDim,cursor:"pointer",fontSize:12,transition:"all .2s",fontFamily:"inherit"}}>
                  + New Phase
                </button>
              </div>
            )}
          </div>
        </div>

        {/* ── PLAYBOOK PANEL ── */}
        {panelOpen ? (
          <PlaybookPanel
            dark={dark}
            theme={theme}
            playbooks={matrix.playbooks||[]}
            activePlaybookId={activePlaybook}
            pbMode={pbMode}
            onSelect={selectPlaybook}
            onSetMode={setPbMode}
            onDeselect={deselectPlaybook}
            onAdd={()=>setShowAddPb(true)}
            onDelete={deletePlaybook}
            onRename={renamePlaybook}
            onUpdateDesc={updatePlaybookDesc}
            onReorder={reorderPlaybook}
            onCollapse={()=>setPanelOpen(false)}
            onOpenGuide={(pbId)=>setShowGuide(pbId)}
            matrix={matrix}
          />
        ) : (
          <div onClick={()=>setPanelOpen(true)} title="Open use cases panel"
            style={{width:32,flexShrink:0,background:isRetro?"#0a0a0e":dark?"#0e0e1e":"#f8f8ff",borderLeft:isRetro?`1px solid #c84b9e`:`1px solid ${dark?"#1e1e38":"#d8d8f0"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:10,transition:isRetro?"none":"background .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background=isRetro?"#131318":dark?"#141430":"#eeeefc"}
            onMouseLeave={e=>e.currentTarget.style.background=isRetro?"#0a0a0e":dark?"#0e0e1e":"#f8f8ff"}>
            <BookIcon color={isRetro?"#e870c0":"#7c6ff7"} size={14}/>
            <span style={{fontSize:10,color:isRetro?"#e870c0":"#7c6ff7",letterSpacing:2,textTransform:"uppercase",writingMode:"vertical-rl",transform:"rotate(180deg)",opacity:.8,whiteSpace:"nowrap"}}>Use Cases</span>
            {(matrix.playbooks||[]).length>0&&(
              <span style={{fontSize:9,color:"#a29bfe",background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:8,padding:"2px 5px",textAlign:"center"}}>
                {(matrix.playbooks||[]).length}
              </span>
            )}
            <div style={{marginTop:"auto",marginBottom:14,opacity:.4}}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#a29bfe" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </div>
          </div>
        )}
      </div>

      {/* ── INCIDENT VIEW ── */}
      {showIncident&&(
        <IncidentView matrix={matrix} theme={theme} dark={dark} onClose={()=>setShowIncident(false)} timerStart={timerStart} onTimerStart={startTimer} onTimerStop={stopTimer}/>
      )}

      {/* ── MODALS ── */}
      {/* Response Guide Overlay */}
      {showGuide&&(()=>{
        const guidePb=(matrix.playbooks||[]).find(p=>p.id===showGuide);
        return guidePb ? <ResponseGuideOverlay dark={dark} theme={theme} playbook={guidePb} matrix={matrix} onClose={()=>setShowGuide(null)}/> : null;
      })()}

      {selected&&selectedTech&&(
        <CellModal dark={dark} tech={selectedTech} categories={categories} onClose={()=>setSelected(null)} onSave={u=>{updateTech(selected.tacticId,selected.techId,u);setSelected(null);}}/>
      )}
      {editTactic&&(
        <TacticEditModal dark={dark} tactic={editTactic} onClose={()=>setEditTactic(null)} onSave={u=>{updateTactic(editTactic.id,u);setEditTactic(null);}}/>
      )}
      {showAddTactic&&<AddTacticModal dark={dark} onClose={()=>setShowAddTactic(false)} onAdd={addTactic}/>}
      {showAddAction&&<AddActionModal dark={dark} tactics={matrix.tactics} preselect={showAddAction?.preselect} onClose={()=>setShowAddAction(false)} onAdd={addAction}/>}
      {showAddPb&&<AddPlaybookModal dark={dark} onClose={()=>setShowAddPb(false)} onAdd={addPlaybook} usedColors={(matrix.playbooks||[]).map(p=>p.color)}/>}
      {showManageCat&&<ManageCategoriesModal dark={dark} categories={categories} onClose={()=>setShowManageCat(false)} onAdd={addCategory} onDelete={deleteCategory}/>}

      <input ref={fileRef} type="file" accept=".html" style={{display:"none"}} onChange={importFile}/>
    </div>
  );
}

// ── Load all data from the GitHub folder structure then boot the app ──
async function loadData() {
  const root = document.getElementById("root");

  // Show a loading state
  root.innerHTML = '<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#0e0e18;font-family:Inter,system-ui,sans-serif;color:#444460;font-size:14px;letter-spacing:0;">Loading IR Navigator…</div>';

  try {
    // Derive base URL robustly — works whether the page is at /repo/ or /repo/index.html
    const base = (() => {
      const loc = window.location.href;
      // Strip query string and hash
      const clean = loc.split('?')[0].split('#')[0];
      // If URL ends with .html, remove the filename; otherwise remove trailing slash
      return clean.endsWith('.html')
        ? clean.substring(0, clean.lastIndexOf('/'))
        : clean.replace(/\/$/, '');
    })();
    const get = path => fetch(`${base}/${path}`).then(r => {
      if(!r.ok) throw new Error(`Could not load "${path}" — HTTP ${r.status}. Check that the file exists in your GitHub repo at that path.`);
      return r.json();
    });

    // Step 1: fetch the master index
    const index = await get('index.json');

    // Step 2: fetch categories, playbooks, and phase metadata — all in parallel
    const [categories, ...playbooksAndPhases] = await Promise.all([
      get(index.categories),
      ...index.playbooks.map(p => get(p)),
      ...index.phases.map(folder => get(folder + '/_phase.json')),
    ]);

    const playbooks = playbooksAndPhases.slice(0, index.playbooks.length);
    const phaseMetas = playbooksAndPhases.slice(index.playbooks.length);

    // Step 3: for each phase, fetch all its action files in parallel
    const tactics = await Promise.all(
      phaseMetas.map(async (phase, i) => {
        const folder = index.phases[i];
        const actions = await Promise.all(
          phase.actions.map(filename => get(folder + '/' + filename))
        );
        return {
          id:        phase.id,
          name:      phase.name,
          shortcode: phase.shortcode,
          url:       phase.url || "",
          techniques: actions,
        };
      })
    );

    // Step 4: assemble the full matrix and render
    const matrix = {
      name:       index.name,
      categories: categories,
      playbooks:  playbooks,
      tactics:    tactics,
    };

    ReactDOM.createRoot(root).render(
      <App initialMatrix={matrix} initialName={index.name}/>
    );

  } catch(err) {
    const msg = err.message || String(err);
    root.innerHTML = `<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0e0e18;font-family:Inter,system-ui,sans-serif;gap:10px;padding:40px;text-align:center;">
      <div style="color:#e94560;font-size:15px;font-weight:600;">Failed to load IR Navigator</div>
      <div style="color:#888;font-size:12px;max-width:560px;">${msg}</div>
      <div style="color:#555;font-size:10px;margin-top:6px;">Page URL: ${window.location.href}</div>
      <div style="color:#555;font-size:10px;">Check the browser console (F12) for more detail.</div>
    </div>`;
    console.error('IR Navigator load error:', err);
  }
}

loadData();
</script>
