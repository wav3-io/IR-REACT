function ManageCategoriesModal({dark, categories, onClose, onAdd, onDelete}) {
  const S = getS(dark);
  const [label,setLabel]   = useState("");
  const [col,setCol]       = useState(CAT_PRESETS[0].color);
  const [bg,setBg]         = useState(CAT_PRESETS[0].bg);
  const [text,setText]     = useState(CAT_PRESETS[0].text);
  const [tab,setTab]       = useState("list"); // "list" | "add"

  const wouldId = label.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const isDupe  = !!categories.find(c=>c.id===wouldId&&wouldId!=='');
  // Only "Uncategorized" (id="") is truly undeletable — it's the fallback
  function applyPreset(p) { setCol(p.color); setBg(p.bg); setText(p.text); }

  return (
    <div className="modal-overlay">
      <div style={{...S.mbox,width:500}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <TagIcon color={dark?"#a29bfe":"#5b4fd4"} size={14}/>
            <span style={{fontSize:14,fontWeight:600,color:dark?"#e8e8f0":"#1a1a2e",fontFamily:"'Space Grotesk',sans-serif"}}>Manage Categories</span>
          </div>
          {/* Tab switcher */}
          <div style={{display:"flex",gap:4,background:dark?"#0c0c1e":"#f0f0f8",border:`1px solid ${dark?"#252545":"#d0d0e8"}`,borderRadius:7,padding:3}}>
            {["list","add"].map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{background:tab===t?(dark?"#252545":"#fff"):"transparent",border:"none",borderRadius:5,padding:"4px 12px",cursor:"pointer",fontSize:11,fontFamily:"inherit",color:tab===t?(dark?"#a29bfe":"#5b4fd4"):(dark?"#666":"#aaa"),transition:"all .15s"}}>
                {t==="list"?"All Categories":"+ New"}
              </button>
            ))}
          </div>
        </div>

        {tab==="list" ? (
          <div>
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:320,overflowY:"auto",paddingRight:4}}>
              {categories.map(cat=>{
                return (
                  <div key={cat.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:dark?"#0e0e1e":"#f8f8ff",border:`1px solid ${dark?"#1e1e38":"#e0e0f0"}`,borderRadius:8}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:cat.text,border:`2px solid ${cat.color}`,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,color:dark?"#ccc":"#333",fontWeight:500}}>{cat.label}</div>
                      <div style={{fontSize:9,color:dark?"#444":"#bbb",marginTop:1}}>ID: {cat.id||"(uncategorized)"}</div>
                    </div>
                    {/* Preview pill */}
                    <div style={{display:"flex",alignItems:"center",gap:4,background:cat.bg,border:`1px solid ${cat.color}`,borderRadius:10,padding:"2px 8px",flexShrink:0}}>
                      <span style={{fontSize:10,color:cat.text}}>{cat.label}</span>
                    </div>
                    {cat.id === "" ? (
                      <span style={{fontSize:9,color:dark?"#444":"#ccc",flexShrink:0,fontStyle:"italic"}}>required</span>
                    ) : (
                      <button onClick={()=>onDelete(cat.id)}
                        onMouseEnter={e=>e.currentTarget.style.color="#e94560"}
                        onMouseLeave={e=>e.currentTarget.style.color=dark?"#e9456055":"#e9456033"}
                        style={{background:"transparent",border:"none",color:dark?"#e9456055":"#e9456033",cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 4px",flexShrink:0,transition:"color .15s"}}
                        title="Delete category">×</button>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:14,display:"flex",justifyContent:"flex-end"}}>
              <button onClick={onClose} style={S.primary}>Done</button>
            </div>
          </div>
        ) : (
          <div>
            <div style={S.ml2}>LABEL</div>
            <input value={label} onChange={e=>setLabel(e.target.value)} placeholder="e.g. Cloud, Endpoint, Threat Intel…" autoFocus style={{...S.input,marginBottom:4}}/>
            {isDupe && <div style={{fontSize:10,color:"#e94560",marginBottom:8}}>A category with this name already exists.</div>}
            {!isDupe && <div style={{...S.note,marginBottom:14}}>ID: <span style={{color:dark?"#888":"#666"}}>{wouldId||"…"}</span></div>}

            <div style={S.ml2}>COLOUR PRESET</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
              {CAT_PRESETS.map((p,i)=>(
                <div key={i} onClick={()=>applyPreset(p)}
                  style={{width:28,height:28,borderRadius:6,background:p.bg,border:`2px solid ${p.color}`,cursor:"pointer",outline:col===p.color?"3px solid #7c6ff7":"3px solid transparent",outlineOffset:2,transition:"outline .12s"}}/>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
              {[{lbl:"BORDER",val:col,set:setCol},{lbl:"BG",val:bg,set:setBg},{lbl:"TEXT",val:text,set:setText}].map(({lbl,val,set})=>(
                <div key={lbl}>
                  <div style={{...S.ml2,marginBottom:4}}>{lbl}</div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <input type="color" value={val} onChange={e=>set(e.target.value)} style={{width:30,height:26,border:"none",background:"transparent",cursor:"pointer",padding:0,flexShrink:0}}/>
                    <input value={val} onChange={e=>set(e.target.value)} style={{...S.input,flex:1,fontSize:10,padding:"4px 6px"}}/>
                  </div>
                </div>
              ))}
            </div>

            {/* Preview */}
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:dark?"#0a0a18":"#f5f5fc",borderRadius:8,border:`1px solid ${dark?"#1e1e35":"#e0e0f0"}`,marginBottom:18}}>
              <span style={{fontSize:10,color:dark?"#444":"#ccc"}}>Preview:</span>
              <div style={{display:"inline-flex",alignItems:"center",gap:5,background:bg,border:`1px solid ${col}`,borderRadius:12,padding:"4px 12px"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:text}}/>
                <span style={{fontSize:12,color:text}}>{label||"Category Name"}</span>
              </div>
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setTab("list")} style={S.ghost}>Back</button>
              <button onClick={()=>{ if(label.trim()&&!isDupe){ onAdd(label.trim(),col,bg,text); setLabel(""); setTab("list"); }}}
                style={{...S.primary,opacity:(!label.trim()||isDupe)?.5:1}}>
                Add Category
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Playbook Panel ──
function PlaybookPanel({dark, playbooks, activePlaybookId, pbMode, onSelect, onSetMode, onDeselect, onAdd, onDelete, onRename, onUpdateDesc, onReorder, onCollapse, onOpenGuide, matrix}) {
  const [collapsed,  setCollapsed]  = useState({});
  const [collapsedPhases, setCollapsedPhases] = useState({});
  const [editingId,  setEditingId]  = useState(null);
  const [editName,   setEditName]   = useState("");
  const [dragId,     setDragId]     = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const [dropPos,    setDropPos]    = useState(null);
  const dragPbRef = useRef(null);

  const panelBg     = dark ? "#0e0e1e" : "#f8f8ff";
  const panelBorder = dark ? "#1e1e38" : "#e0e0f0";
  const headerBg    = dark ? "#111120" : "#ffffff";
  const cardBg      = dark ? "#0e0e1e" : "#f8f8ff";
  const textMain    = dark ? "#ccccee" : "#2a2a4a";
  const textSub     = dark ? "#666688" : "#9090b0";

  function getOrderedTechs(pb) {
    const lookup = {};
    matrix.tactics.forEach(t => t.techniques.forEach(te => { lookup[te.id] = {te, tacticName:t.name}; }));
    return pb.techIds.map(id => lookup[id]).filter(Boolean);
  }
  function getSteps(pb) {
    const lookup = {};
    matrix.tactics.forEach(t => t.techniques.forEach(te => { lookup[te.id] = {te, tactic:t}; }));
    const phaseMap = {};
    pb.techIds.forEach(id => {
      const entry = lookup[id]; if(!entry) return;
      const tid = entry.tactic.id;
      if(!phaseMap[tid]) phaseMap[tid] = {tactic:entry.tactic, techniques:[]};
      phaseMap[tid].techniques.push(entry.te);
    });
    const tacticOrder = matrix.tactics.map(t => t.id);
    return tacticOrder.filter(tid => phaseMap[tid]).map(tid => phaseMap[tid]);
  }
  function getTechUrl(techId) {
    for(const t of matrix.tactics) { const te=t.techniques.find(x=>x.id===techId); if(te) return te.url||""; }
    return "";
  }

  function onDragStart(e, techId, pbId) { setDragId(techId); dragPbRef.current=pbId; e.dataTransfer.effectAllowed="move"; }
  function onDragEnter(e, techId) {
    if(techId===dragId) return; setDragOverId(techId);
    const r=e.currentTarget.getBoundingClientRect();
    setDropPos(e.clientY-(r.top+r.height/2)<=0?"above":"below");
  }
  function onDragOver(e, techId) {
    e.preventDefault(); if(techId===dragId) return;
    const r=e.currentTarget.getBoundingClientRect();
    setDropPos(e.clientY-(r.top+r.height/2)<=0?"above":"below");
  }
  function onDragLeave(e) { if(!e.currentTarget.contains(e.relatedTarget)){ setDragOverId(null); setDropPos(null); } }
  function onDrop(e, targetId, pbId) {
    e.preventDefault();
    if(dragId&&targetId&&dragId!==targetId&&dragPbRef.current===pbId) onReorder(pbId,dragId,targetId,dropPos||"below");
    setDragId(null); setDragOverId(null); setDropPos(null); dragPbRef.current=null;
  }
  function onDragEnd() { setDragId(null); setDragOverId(null); setDropPos(null); dragPbRef.current=null; }

  return (
    <div style={{width:268,flexShrink:0,background:panelBg,borderLeft:`1px solid ${panelBorder}`,display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"12px 14px 10px",borderBottom:`1px solid ${panelBorder}`,background:headerBg,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <BookIcon color="#7c6ff7" size={14}/>
          <span style={{fontSize:12,color:"#7c6ff7",letterSpacing:1,fontWeight:600}}>USE CASES</span>
        </div>
        <div style={{display:"flex",gap:5}}>
          <button onClick={onAdd} title="New use case" style={{background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:5,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <PlusIcon color="#7c6ff7" size={10}/>
          </button>
          <button onClick={onCollapse} title="Collapse panel"
            onMouseEnter={e=>e.currentTarget.style.borderColor="#7c6ff7"}
            onMouseLeave={e=>e.currentTarget.style.borderColor=dark?"#3a3a6a":"#c4b5fd"}
            style={{background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:5,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"border-color .15s"}}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#7c6ff7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 10px 16px"}}>
        {playbooks.length===0 && (
          <div style={{textAlign:"center",color:textSub,fontSize:11,padding:"24px 12px",lineHeight:1.7}}>
            No use cases yet.<br/>Click + to create one.
          </div>
        )}

        {playbooks.map(pb=>{
          const isActive    = activePlaybookId===pb.id;
          const isEdit      = isActive&&pbMode==="edit";
          const isView      = isActive&&pbMode==="view";
          const isCollapsed = !isActive&&!collapsed[pb.id];
          const techCount   = pb.techIds.length;
          const ordered     = getOrderedTechs(pb);
          const steps       = getSteps(pb);

          return (
            <div key={pb.id} className="pb-card fade-in" style={{border:`1px solid ${isActive?pb.color+"99":panelBorder}`,borderRadius:10,marginBottom:8,overflow:"hidden",background:isActive?`${pb.color}0d`:cardBg}}>
              {/* Card header */}
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"9px 10px",cursor:"pointer"}} onClick={()=>isActive?onDeselect():onSelect(pb.id)}>
                <div style={{width:9,height:9,borderRadius:"50%",background:pb.color,flexShrink:0,boxShadow:isActive?`0 0 7px ${pb.color}`:"none",transition:"box-shadow .2s"}}/>
                <div style={{flex:1,minWidth:0}}>
                  {editingId===pb.id ? (
                    <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)}
                      onBlur={()=>{onRename(pb.id,editName.trim()||pb.name);setEditingId(null);}}
                      onKeyDown={e=>{if(e.key==="Enter"){onRename(pb.id,editName.trim()||pb.name);setEditingId(null);}if(e.key==="Escape")setEditingId(null);}}
                      onClick={e=>e.stopPropagation()}
                      style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${pb.color}`,color:textMain,fontSize:12,outline:"none",fontFamily:"inherit",padding:"1px 0"}}/>
                  ) : (
                    <span onDoubleClick={e=>{e.stopPropagation();setEditingId(pb.id);setEditName(pb.name);}} title="Double-click to rename"
                      style={{fontSize:12,color:isActive?textMain:textSub,fontWeight:isActive?600:400,lineHeight:1.2,display:"block"}}>
                      {pb.name}
                    </span>
                  )}
                  {pb.description&&editingId!==pb.id&&(
                    <div onDoubleClick={e=>{e.stopPropagation();setEditingId("desc-"+pb.id);setEditName(pb.description);}} title="Double-click to edit description"
                      style={{fontSize:10,fontStyle:"italic",color:textSub,opacity:.7,lineHeight:1.3,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {pb.description}
                    </div>
                  )}
                  {editingId==="desc-"+pb.id&&(
                    <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)}
                      onBlur={()=>{onUpdateDesc(pb.id,editName.trim());setEditingId(null);}}
                      onKeyDown={e=>{if(e.key==="Enter"){onUpdateDesc(pb.id,editName.trim());setEditingId(null);}if(e.key==="Escape")setEditingId(null);}}
                      onClick={e=>e.stopPropagation()}
                      placeholder="Add description…"
                      style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${pb.color}44`,color:textSub,fontSize:10,fontStyle:"italic",outline:"none",fontFamily:"inherit",padding:"1px 0",marginTop:1}}/>
                  )}
                </div>
                <span style={{fontSize:10,color:isActive?pb.color:textSub,background:isActive?`${pb.color}22`:dark?"#181830":"#eeeefc",borderRadius:10,padding:"1px 7px",flexShrink:0}}>{techCount}</span>
                {!isActive&&techCount>0&&(
                  <div onClick={e=>{e.stopPropagation();setCollapsed(c=>({...c,[pb.id]:!c[pb.id]}));}} style={{cursor:"pointer",opacity:.4,display:"flex"}}>
                    <ChevronIcon color={textSub} size={10} up={!isCollapsed}/>
                  </div>
                )}
                <button onClick={e=>{e.stopPropagation();onDelete(pb.id);}}
                  onMouseEnter={e=>e.currentTarget.style.color="#e94560"}
                  onMouseLeave={e=>e.currentTarget.style.color="#e9456044"}
                  style={{background:"transparent",border:"none",color:"#e9456044",cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 2px",flexShrink:0,transition:"color .15s"}}>×</button>
              </div>

              {/* Mode toggles */}
              {isActive&&!pb.description&&editingId!=="desc-"+pb.id&&(
                <div className="fade-in" style={{padding:"0 10px 6px"}}>
                  <span onClick={e=>{e.stopPropagation();setEditingId("desc-"+pb.id);setEditName("");}}
                    style={{fontSize:10,color:textSub,opacity:.5,cursor:"pointer",fontStyle:"italic",transition:"opacity .15s"}}
                    onMouseEnter={e=>e.currentTarget.style.opacity=1}
                    onMouseLeave={e=>e.currentTarget.style.opacity=.5}>
                    + add description
                  </span>
                </div>
              )}
              {isActive&&(
                <div className="fade-in" style={{display:"flex",gap:6,padding:"0 10px 10px"}}>
                  {[{id:"view",label:"View",Icon:EyeIcon},{id:"edit",label:"Edit",Icon:PencilIcon}].map(({id,label,Icon})=>{
                    const on=pbMode===id;
                    return (
                      <button key={id} className="mode-btn" onClick={()=>onSetMode(id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"6px 0",borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:11,background:on?`${pb.color}22`:"transparent",border:`1px solid ${on?pb.color:dark?"#2a2a45":"#d0d0e8"}`,color:on?pb.color:textSub,transition:"all .15s"}}>
                        <Icon color={on?pb.color:textSub} size={11}/>{label}
                      </button>
                    );
                  })}
                  <button className="mode-btn" onClick={()=>onOpenGuide&&onOpenGuide(pb.id)}
                    style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"6px 0",borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:11,background:"transparent",border:`1px solid ${dark?"#2a2a45":"#d0d0e8"}`,color:textSub,transition:"all .15s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=pb.color;e.currentTarget.style.color=pb.color;}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=dark?"#2a2a45":"#d0d0e8";e.currentTarget.style.color=textSub;}}>
                    <GuideIcon color="currentColor" size={11}/>Guide
                  </button>
                </div>
              )}

              {isView&&(
                <div className="fade-in" style={{padding:"0 10px 8px",display:"flex",alignItems:"center",gap:6}}>
                  <EyeIcon color={pb.color} size={10}/>
                  <span style={{fontSize:10,color:pb.color,opacity:.8}}>Highlighted actions open their link on click</span>
                </div>
              )}
              {isEdit&&(
                <div className="fade-in" style={{padding:"0 10px 8px",display:"flex",alignItems:"center",gap:6}}>
                  <div className="rec-dot" style={{width:6,height:6,borderRadius:"50%",background:pb.color,flexShrink:0}}/>
                  <span style={{fontSize:10,color:pb.color,opacity:.8}}>Click matrix to add/remove · Drag rows to reorder</span>
                </div>
              )}

              {/* Step list */}
              {(isActive||!isCollapsed)&&techCount>0&&(
                <div className="fade-in" style={{borderTop:`1px solid ${pb.color}22`,padding:"6px 0 4px"}}>
                  {isEdit ? (
                    <div>
                      {ordered.map(({te,tacticName})=>{
                        const isDragging=dragId===te.id;
                        const isTarget=dragOverId===te.id;
                        let cls="drag-row pb-tech-row";
                        if(isDragging) cls+=" dragging";
                        if(isTarget&&dropPos==="above") cls+=" drop-above";
                        if(isTarget&&dropPos==="below") cls+=" drop-below";
                        return (
                          <div key={te.id} className={cls} style={{"--drop-color":pb.color,display:"flex",alignItems:"center",gap:5,padding:"4px 8px 4px 4px",margin:"0 4px"}}
                            draggable={true} onDragStart={e=>onDragStart(e,te.id,pb.id)} onDragEnter={e=>onDragEnter(e,te.id)} onDragOver={e=>onDragOver(e,te.id)} onDragLeave={onDragLeave} onDrop={e=>onDrop(e,te.id,pb.id)} onDragEnd={onDragEnd}>
                            <span className="drag-handle" title="Drag to reorder"><GripIcon color={pb.color}/></span>
                            <div style={{width:4,height:4,borderRadius:"50%",background:pb.color,flexShrink:0,opacity:.7}}/>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:11,color:textMain,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{te.name}</div>
                              <div style={{fontSize:9,color:textSub,marginTop:1}}>{tacticName} · {te.id}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    steps.map(({tactic,techniques})=>{
                      const phaseKey=pb.id+"-"+tactic.id;
                      const isPhaseCollapsed=!collapsedPhases[phaseKey];
                      return (
                      <div key={tactic.id} style={{marginBottom:4}}>
                        <div onClick={()=>setCollapsedPhases(c=>({...c,[phaseKey]:!c[phaseKey]}))}
                          style={{fontSize:9,color:pb.color,opacity:.6,letterSpacing:2,textTransform:"uppercase",padding:"4px 10px 3px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"opacity .15s",userSelect:"none"}}
                          onMouseEnter={e=>e.currentTarget.style.opacity=1}
                          onMouseLeave={e=>e.currentTarget.style.opacity=.6}>
                          <svg width="7" height="7" viewBox="0 0 24 24" fill="none" stroke={pb.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                            style={{transform:isPhaseCollapsed?"none":"rotate(90deg)",transition:"transform .15s",flexShrink:0}}>
                            <polyline points="9 18 15 12 9 6"/>
                          </svg>
                          {tactic.name}
                          <span style={{fontSize:8,opacity:.5}}>({techniques.length})</span>
                        </div>
                        {!isPhaseCollapsed&&techniques.map(te=>{
                          const techUrl=getTechUrl(te.id);
                          const clickable=isView&&!!techUrl;
                          return (
                            <div key={te.id} className={`pb-tech-row${clickable?" clickable":""}`} onClick={()=>clickable&&openLink(techUrl)}
                              style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",margin:"0 4px"}}>
                              <div style={{width:4,height:4,borderRadius:"50%",background:pb.color,flexShrink:0,opacity:.7}}/>
                              <span style={{fontSize:11,color:clickable?textMain:textSub,flex:1,lineHeight:1.3}}>{te.name}</span>
                              {clickable?<LinkIcon color={pb.color} size={9}/>:<span style={{fontSize:9,color:textSub,opacity:.6}}>{te.id}</span>}
                            </div>
                          );
                        })}
                      </div>
                      );
                    })
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Footer */}
      {activePlaybookId&&(
        <div style={{padding:"8px 10px",borderTop:`1px solid ${panelBorder}`,flexShrink:0}}>
          <button onClick={onDeselect}
            onMouseEnter={e=>{e.target.style.borderColor="#e94560";e.target.style.color="#e94560";}}
            onMouseLeave={e=>{e.target.style.borderColor=dark?"#2e2e5e":"#d0d0e8";e.target.style.color=dark?"#666":"#aaa";}}
            style={{width:"100%",background:"transparent",border:`1px solid ${dark?"#2e2e5e":"#d0d0e8"}`,borderRadius:6,color:dark?"#666":"#aaa",padding:"6px",cursor:"pointer",fontSize:11,fontFamily:"inherit",transition:"all .15s"}}>
            ✕ Deselect use case
          </button>
        </div>
      )}
    </div>
  );
}

// ── Response Guide Overlay ──
function ResponseGuideOverlay({dark, playbook, matrix, onClose}) {
  const [expanded, setExpanded] = useState({});
  const toggle = id => setExpanded(e=>({...e,[id]:!e[id]}));

  // Build phase-grouped actions from playbook techIds
  const lookup = {};
  matrix.tactics.forEach(t => t.techniques.forEach(te => { lookup[te.id] = {te, tactic:t}; }));

  const phaseMap = {};
  playbook.techIds.forEach(id => {
    const entry = lookup[id]; if(!entry) return;
    const tid = entry.tactic.id;
    if(!phaseMap[tid]) phaseMap[tid] = {tactic:entry.tactic, techniques:[]};
    phaseMap[tid].techniques.push(entry.te);
  });

  const tacticOrder = matrix.tactics.map(t => t.id);
  const phases = tacticOrder.filter(tid => phaseMap[tid]).map(tid => phaseMap[tid]);

  const totalActions = playbook.techIds.filter(id=>lookup[id]).length;

  // Phase badge colors
  const phaseBadge = {
    P:{ bg:dark?"#1a365d":"#dbeafe", text:dark?"#63b3ed":"#1d4ed8" },
    I:{ bg:dark?"#2d1f5e":"#ede9fe", text:dark?"#b794f4":"#5b21b6" },
    C:{ bg:dark?"#4a2e08":"#ffedd5", text:dark?"#f6ad55":"#c2410c" },
    E:{ bg:dark?"#4a1010":"#ffe4e6", text:dark?"#fc8181":"#be123c" },
    R:{ bg:dark?"#143325":"#dcfce7", text:dark?"#68d391":"#15803d" },
    L:{ bg:dark?"#3b1a3b":"#fce7f3", text:dark?"#d6bcfa":"#a21caf" },
  };

  const bgMain   = dark?"#0e0e18":"#f0f0f8";
  const bgCard   = dark?"#161628":"#ffffff";
  const borderC  = dark?"#2e2e50":"#d8d8f0";
  const textMain = dark?"#e8e8f0":"#1a1a2e";
  const textSub  = dark?"#8888aa":"#6060a0";
  const textDim  = dark?"#555577":"#a0a0c0";
  const surfaceBg= dark?"#1a1a2e":"#f5f5fc";

  return (
    <div style={{position:"fixed",inset:0,background:bgMain,zIndex:2000,display:"flex",flexDirection:"column",fontFamily:"'DM Mono',monospace",overflow:"hidden"}}>
      {/* Header bar */}
      <div style={{padding:"16px 28px",borderBottom:`1px solid ${borderC}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:dark?"#111120":"#ffffff"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:playbook.color,boxShadow:`0 0 8px ${playbook.color}`}}/>
          <span style={{fontSize:16,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:textMain}}>Response Guide</span>
          <span style={{fontSize:12,color:textSub}}>—</span>
          <span style={{fontSize:14,fontFamily:"'Space Grotesk',sans-serif",fontWeight:600,color:playbook.color}}>{playbook.name}</span>
          <span style={{fontSize:11,color:textDim,background:dark?"#1e1e38":"#eeeefc",borderRadius:10,padding:"2px 10px"}}>{totalActions} actions across {phases.length} phases</span>
        </div>
        <button onClick={onClose}
          onMouseEnter={e=>{e.currentTarget.style.background=dark?"#2a2a4a":"#e0e0f0";}}
          onMouseLeave={e=>{e.currentTarget.style.background=dark?"#1a1a3a":"#ede9fe";}}
          style={{background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:7,padding:"6px 16px",cursor:"pointer",color:dark?"#a29bfe":"#5b4fd4",fontSize:12,fontFamily:"inherit",transition:"background .15s",display:"flex",alignItems:"center",gap:6}}>
          ← Back to Matrix
        </button>
      </div>

      {/* Scrollable content */}
      <div style={{flex:1,overflowY:"auto",padding:"28px 40px 60px"}}>
        <div style={{maxWidth:880,margin:"0 auto"}}>

          {/* Playbook hero header */}
          <div style={{background:`linear-gradient(135deg, ${playbook.color}18, ${playbook.color}08)`,border:`1px solid ${playbook.color}44`,borderBottom:`3px solid ${playbook.color}`,borderRadius:12,padding:"24px 30px",marginBottom:28}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <span style={{fontSize:48,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:playbook.color,opacity:.35,lineHeight:1}}>
                {String(((matrix.playbooks||[]).indexOf(playbook))+1).padStart(2,"0")}
              </span>
              <div>
                <div style={{fontSize:22,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:playbook.color}}>{playbook.name}</div>
                {playbook.description&&(
                  <div style={{fontSize:13,fontStyle:"italic",color:textSub,marginTop:4,lineHeight:1.4}}>{playbook.description}</div>
                )}
                <div style={{fontSize:12,color:textDim,marginTop:2}}>PICERL Response Guide — {totalActions} actions</div>
              </div>
            </div>
          </div>

          {/* Phase sections */}
          {phases.length===0 && (
            <div style={{textAlign:"center",padding:"60px 20px",color:textDim,fontSize:13}}>
              No actions assigned to this use case yet.<br/>
              <span style={{fontSize:11,opacity:.7}}>Use Edit mode on the main matrix to add actions, then return to this guide.</span>
            </div>
          )}

          {phases.map(({tactic, techniques}) => {
            const badge = phaseBadge[tactic.shortcode] || phaseBadge.P;
            return (
              <div key={tactic.id} style={{marginBottom:24}}>
                {/* Phase header */}
                <div style={{display:"flex",alignItems:"center",gap:10,paddingBottom:8,marginBottom:8,borderBottom:`1px solid ${borderC}`}}>
                  <span style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",padding:"4px 12px",borderRadius:5,background:badge.bg,color:badge.text}}>
                    {tactic.shortcode}
                  </span>
                  <span style={{fontSize:15,fontFamily:"'Space Grotesk',sans-serif",fontWeight:600,color:badge.text}}>
                    {tactic.name}
                  </span>
                  <span style={{fontSize:10,color:textDim}}>{techniques.length} action{techniques.length!==1?"s":""}</span>
                </div>

                {/* Action rows */}
                {techniques.map(tech => {
                  const isOpen = expanded[tech.id];
                  const hasDetail = tech.description || (tech.sections && tech.sections.length > 0);
                  return (
                    <div key={tech.id}>
                      <div
                        onClick={()=>hasDetail && toggle(tech.id)}
                        style={{display:"flex",alignItems:"center",gap:12,padding:"7px 4px 7px 18px",cursor:hasDetail?"pointer":"default",borderRadius:6,transition:"background .12s",background:isOpen?(dark?"#1a1a30":"#f0f0fa"):"transparent"}}
                        onMouseEnter={e=>{if(hasDetail) e.currentTarget.style.background=dark?"#1a1a30":"#f0f0fa";}}
                        onMouseLeave={e=>{if(!isOpen) e.currentTarget.style.background="transparent";}}
                      >
                        {/* Expand chevron */}
                        <div style={{width:14,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",opacity:hasDetail?0.5:0.15}}>
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={textSub} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                            style={{transform:isOpen?"rotate(90deg)":"none",transition:"transform .15s"}}>
                            <polyline points="9 18 15 12 9 6"/>
                          </svg>
                        </div>

                        {/* ID */}
                        <span style={{fontSize:12,color:textDim,fontFamily:"'DM Mono',monospace",minWidth:58,flexShrink:0}}>{tech.id}</span>

                        {/* Name */}
                        <span style={{fontSize:13,color:textMain,flex:1}}>{tech.name}</span>

                        {/* Link icon if URL exists */}
                        {tech.url && (
                          <a href={tech.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                            style={{flexShrink:0,opacity:.4,display:"flex",alignItems:"center"}}
                            onMouseEnter={e=>e.currentTarget.style.opacity=1}
                            onMouseLeave={e=>e.currentTarget.style.opacity=.4}>
                            <LinkIcon color={playbook.color} size={11}/>
                          </a>
                        )}
                      </div>

                      {/* Expanded detail panel */}
                      {isOpen && hasDetail && (
                        <div className="fade-in" style={{marginLeft:44,padding:"6px 16px 14px",borderLeft:`2px solid ${playbook.color}33`}}>
                          {/* Description */}
                          {tech.description && (
                            <div style={{fontSize:12,fontStyle:"italic",color:textSub,lineHeight:1.5,marginBottom:tech.sections?.length>0?10:0}}>
                              {tech.description}
                            </div>
                          )}

                          {/* Sections */}
                          {tech.sections && tech.sections.length > 0 && tech.sections.map(sec => (
                            <GuideSection key={sec.id} sec={sec} dark={dark} pbColor={playbook.color}/>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}

        </div>
      </div>
    </div>
  );
}

function GuideSection({sec, dark, pbColor}) {
  const [open, setOpen] = useState(false);
  const [copied, setCopied] = useState(false);
  const textSub  = dark?"#8888aa":"#6060a0";
  const textMain = dark?"#ccc":"#333";
  const borderC  = dark?"#252545":"#d8d8f0";

  function handleCopy(e) {
    e.stopPropagation();
    if(!sec.body) return;
    navigator.clipboard.writeText(sec.body).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 1800);
    }).catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = sec.body;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(()=>setCopied(false), 1800);
    });
  }

  return (
    <div style={{marginBottom:4}}>
      <div onClick={()=>setOpen(!open)}
        style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",padding:"4px 0"}}
        onMouseEnter={e=>e.currentTarget.querySelector('.sec-title').style.color=pbColor}
        onMouseLeave={e=>e.currentTarget.querySelector('.sec-title').style.color=textSub}>
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke={textSub} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
          style={{transform:open?"rotate(90deg)":"none",transition:"transform .15s",flexShrink:0}}>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span className="sec-title" style={{fontSize:11,fontWeight:600,color:textSub,letterSpacing:.5,transition:"color .12s"}}>{sec.title || "Notes"}</span>
        {sec.url&&(
          <a href={sec.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
            title={sec.url}
            style={{display:"inline-flex",alignItems:"center",opacity:.5,transition:"opacity .15s"}}
            onMouseEnter={e=>e.currentTarget.style.opacity=1}
            onMouseLeave={e=>e.currentTarget.style.opacity=.5}>
            <LinkIcon color={dark?"#63b3ed":"#2b6cb0"} size={9}/>
          </a>
        )}
      </div>
      {open && (
        <div className="fade-in" style={{position:"relative",margin:"2px 0 6px 14px",borderRadius:5,border:`1px solid ${borderC}`,overflow:"hidden"}}>
          {sec.body&&(
            <button
              onClick={handleCopy}
              title={copied?"Copied!":"Copy to clipboard"}
              style={{
                position:"absolute",top:5,right:5,
                background:copied?(dark?"#1a3a1a":"#e6f7e6"):(dark?"#1a1a3a":"#ede9fe"),
                border:`1px solid ${copied?(dark?"#276749":"#86efac"):(dark?"#3a3a6a":"#c4b5fd")}`,
                borderRadius:4,padding:"2px 6px",cursor:"pointer",
                fontSize:9,fontFamily:"inherit",
                color:copied?(dark?"#68d391":"#15803d"):(dark?"#a29bfe":"#5b4fd4"),
                display:"flex",alignItems:"center",gap:3,
                transition:"all .2s",zIndex:1,
              }}>
              {copied
                ? <><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied</>
                : <><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2 2v1"/></svg> Copy</>
              }
            </button>
          )}
          <div style={{padding:"6px 8px",paddingRight:sec.body?"52px":"8px",background:dark?"#0c0c1e88":"#f0f0f888",fontSize:12,color:textMain,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",minHeight:28}}>
            {sec.body || <span style={{opacity:.4,fontStyle:"italic"}}>empty</span>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Main App ──
function App({initialMatrix, initialName}) {
  const [theme,         setTheme]         = useState("dark");
  const [matrix,        setMatrix]        = useState({...initialMatrix, playbooks:initialMatrix.playbooks||[], categories:initialMatrix.categories||DEFAULT_CATEGORIES});
  const [selected,      setSelected]      = useState(null);
  const [editTactic,    setEditTactic]    = useState(null);
  const [showAddTactic, setShowAddTactic] = useState(false);
  const [showAddAction, setShowAddAction] = useState(false);
  const [showAddPb,     setShowAddPb]     = useState(false);
  const [showManageCat, setShowManageCat] = useState(false);
  const [hoveredCell,   setHoveredCell]   = useState(null);
  const [hoveredTactic, setHoveredTactic] = useState(null);
  const [matrixName,    setMatrixName]    = useState(initialName||"Incident Response — PICERL");
  const [editingName,   setEditingName]   = useState(false);
  const [filterCat,     setFilterCat]     = useState("");
  const [activePlaybook,setActivePlaybook]= useState(null);
  const [pbMode,        setPbMode]        = useState(null);
  const [panelOpen,     setPanelOpen]     = useState(true);
  const [showGuide,     setShowGuide]     = useState(null); // playbook id for guide view
  const fileRef = useRef();

  const dark = theme !== "light";

  // Apply theme to html element
  useEffect(()=>{ document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  // Escape key to close guide overlay
  useEffect(()=>{
    const handler = e => { if(e.key==="Escape"&&showGuide) setShowGuide(null); };
    window.addEventListener("keydown",handler);
    return ()=>window.removeEventListener("keydown",handler);
  }, [showGuide]);

  const categories   = matrix.categories || DEFAULT_CATEGORIES;
  const getCat       = id => categories.find(c=>c.id===id)||categories[0];
  const activePb     = (matrix.playbooks||[]).find(p=>p.id===activePlaybook)||null;
  const selectedTech = selected ? matrix.tactics.find(t=>t.id===selected.tacticId)?.techniques.find(te=>te.id===selected.techId) : null;

  const TACTIC_ACCENTS = dark ? TACTIC_ACCENTS_DARK : TACTIC_ACCENTS_LIGHT;
  const DEF_ACCENT     = dark ? DEF_ACCENT_DARK      : DEF_ACCENT_LIGHT;

  // ── Playbook fns ──
  function selectPlaybook(pbId) { setActivePlaybook(pbId); setPbMode("view"); setSelected(null); }
  function deselectPlaybook()   { setActivePlaybook(null); setPbMode(null); }
  function addPlaybook(name,color,description) { setMatrix(m=>({...m,playbooks:[...(m.playbooks||[]),{id:uid(),name,color,description:description||"",techIds:[]}]})); setShowAddPb(false); }
  function deletePlaybook(pbId)    { setMatrix(m=>({...m,playbooks:(m.playbooks||[]).filter(p=>p.id!==pbId)})); if(activePlaybook===pbId) deselectPlaybook(); }
  function renamePlaybook(pbId,name) { setMatrix(m=>({...m,playbooks:(m.playbooks||[]).map(p=>p.id!==pbId?p:{...p,name})})); }
  function updatePlaybookDesc(pbId,description) { setMatrix(m=>({...m,playbooks:(m.playbooks||[]).map(p=>p.id!==pbId?p:{...p,description})})); }
  function reorderPlaybook(pbId,dragId,targetId,pos) {
    setMatrix(m=>({...m,playbooks:(m.playbooks||[]).map(p=>{
      if(p.id!==pbId) return p;
      const ids=p.techIds.filter(id=>id!==dragId), at=ids.indexOf(targetId);
      if(at===-1) return p;
      const out=[...ids]; out.splice(pos==="above"?at:at+1,0,dragId);
      return {...p,techIds:out};
    })}));
  }
  function toggleTechInPlaybook(pbId,techId) {
    setMatrix(m=>({...m,playbooks:(m.playbooks||[]).map(p=>{
      if(p.id!==pbId) return p;
      const has=p.techIds.includes(techId);
      return {...p,techIds:has?p.techIds.filter(id=>id!==techId):[...p.techIds,techId]};
    })}));
  }

  // ── Matrix fns ──
  function updateTech(tacticId,techId,updates) { setMatrix(m=>({...m,tactics:m.tactics.map(t=>t.id!==tacticId?t:{...t,techniques:t.techniques.map(te=>te.id!==techId?te:{...te,...updates})})})); }
  function updateTactic(tacticId,updates)      { setMatrix(m=>({...m,tactics:m.tactics.map(t=>t.id!==tacticId?t:{...t,...updates})})); }
  function deleteTech(tacticId,techId) {
    setMatrix(m=>({...m,
      tactics:  m.tactics.map(t=>t.id!==tacticId?t:{...t,techniques:t.techniques.filter(te=>te.id!==techId)}),
      playbooks:(m.playbooks||[]).map(p=>({...p,techIds:p.techIds.filter(id=>id!==techId)})),
    }));
  }
  function deleteTactic(tacticId)    { setMatrix(m=>({...m,tactics:m.tactics.filter(t=>t.id!==tacticId)})); }
  function addTactic(name,url)       { setMatrix(m=>({...m,tactics:[...m.tactics,{id:uid(),name,url,techniques:[]}]})); setShowAddTactic(false); }
  function addAction(tacticId,id,name,url,description) { setMatrix(m=>({...m,tactics:m.tactics.map(t=>t.id!==tacticId?t:{...t,techniques:[...t.techniques,{id,name,url,description:description||"",category:"",comment:""}]})})); setShowAddAction(false); }

  // ── Category fns ──
  function addCategory(label,color,bg,text) {
    const id=label.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    if(categories.find(c=>c.id===id)) return;
    setMatrix(m=>({...m,categories:[...(m.categories||DEFAULT_CATEGORIES),{id,label,color,bg,text}]}));
  }
  function deleteCategory(catId) {
    if(catId==="") return; // "Uncategorized" is the fallback, never delete it
    setMatrix(m=>({...m,
      categories:(m.categories||DEFAULT_CATEGORIES).filter(c=>c.id!==catId),
      tactics:m.tactics.map(t=>({...t,techniques:t.techniques.map(te=>te.category===catId?{...te,category:""}:te)})),
    }));
    if(filterCat===catId) setFilterCat("");
  }

  // ── Click routing ──
  function handleTechClick(tacticId,tech) {
    if(activePb) {
      if(pbMode==="edit") { toggleTechInPlaybook(activePlaybook,tech.id); return; }
      if(pbMode==="view"&&activePb.techIds.includes(tech.id)&&tech.url) openLink(tech.url);
      return;
    }
    if(tech.url) openLink(tech.url);
    else setSelected({tacticId,techId:tech.id});
  }
  function handleTacticClick(tactic) {
    if(activePb) return;
    if(tactic.url) openLink(tactic.url);
    else setEditTactic(tactic);
  }

  // ── Export / Import ──
  function exportSnapshot() { exportHTML({...matrix},matrixName); }
  function importFile(e) {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const match=ev.target.result.match(/<script id="matrix-data"[^>]*>([\s\S]*?)<\/script>/);
        if(match){ const d=JSON.parse(match[1]); setMatrix({...d,playbooks:d.playbooks||[],categories:d.categories||DEFAULT_CATEGORIES}); setMatrixName(d.name||"Imported"); }
        else alert("Could not find matrix data in this file.");
      } catch { alert("Failed to parse the file."); }
    };
    reader.readAsText(file); e.target.value="";
  }
  function clearAll() {
    setMatrix(m=>({...m,
      tactics:  m.tactics.map(t=>({...t,techniques:t.techniques.map(te=>({...te,category:"",comment:""}))})),
      playbooks:(m.playbooks||[]).map(p=>({...p,techIds:[]})),
    }));
  }

  // ── Stats ──
  const totalTechs       = matrix.tactics.reduce((s,t)=>s+t.techniques.length,0);
  const categorizedTechs = matrix.tactics.reduce((s,t)=>s+t.techniques.filter(te=>te.category).length,0);
  const linkedTechs      = matrix.tactics.reduce((s,t)=>s+t.techniques.filter(te=>te.url).length,0);
  const linkedPhases     = matrix.tactics.filter(t=>t.url).length;
  const catCounts        = categories.slice(1).map(c=>({...c,count:matrix.tactics.reduce((s,t)=>s+t.techniques.filter(te=>te.category===c.id).length,0)})).filter(c=>c.count>0);

  // ── Theme colors (read from CSS variables so all 4 themes work) ──
  const getVar = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const [themeColors, setThemeColors] = useState({});
  useEffect(()=>{
    // Small delay to let CSS apply
    requestAnimationFrame(()=>{
      setThemeColors({
        bg:       getVar('--bg'),
        headerBg: getVar('--header-bg'),
        bg2:      getVar('--bg2'),
        bg3:      getVar('--bg3'),
        surface:  getVar('--surface'),
        border:   getVar('--border'),
        border2:  getVar('--border2'),
        text:     getVar('--text'),
        text2:    getVar('--text2'),
        text3:    getVar('--text3'),
        text4:    getVar('--text4'),
        accent:   getVar('--accent'),
        accent2:  getVar('--accent2'),
        cellBg:   getVar('--cell-bg'),
        cellBorder:getVar('--cell-border'),
        inputBg:  getVar('--input-bg'),
        inputBorder:getVar('--input-border'),
        modalBg:  getVar('--modal-bg'),
      });
    });
  }, [theme]);
  const bg        = themeColors.bg       || (dark?"#0e0e18":"#f0f0f8");
  const headerBg  = themeColors.headerBg || (dark?"#111120":"#ffffff");
  const barBg     = themeColors.bg2      || (dark?"#0c0c1a":"#e8e8f4");
  const hintBg    = dark?"#0a0a12":"#f0f0fa";
  const border    = themeColors.border   || (dark?"#1e1e38":"#d8d8f0");
  const border2   = themeColors.border2  || (dark?"#252545":"#c8c8e8");
  const textMain  = themeColors.text     || (dark?"#e8e8f0":"#1a1a2e");
  const textSub   = themeColors.text3    || (dark?"#8888aa":"#6060a0");
  const textDim   = themeColors.text4    || (dark?"#444460":"#b0b0cc");
  const cellBg    = themeColors.cellBg   || (dark?"#161628":"#ffffff");
  const cellBorderBase = themeColors.cellBorder || (dark?"#252545":"#d8d8f0");

  const S = getS(dark);

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:bg,fontFamily:"'DM Mono',monospace",color:textMain}}>

      {/* ── HEADER ── */}
      <header style={{background:headerBg,borderBottom:`1px solid ${border}`,padding:"13px 22px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",flexShrink:0,boxShadow:dark?"none":"0 1px 8px rgba(0,0,0,.06)"}}>
        <div style={{flex:1,minWidth:220}}>
          {editingName ? (
            <input value={matrixName} onChange={e=>setMatrixName(e.target.value)} onBlur={()=>setEditingName(false)} onKeyDown={e=>e.key==="Enter"&&setEditingName(false)} autoFocus
              style={{fontSize:18,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,background:"transparent",border:"none",borderBottom:"2px solid #7c6ff7",color:textMain,outline:"none",padding:"2px 0",minWidth:280}}/>
          ) : (
            <h1 onClick={()=>setEditingName(true)} title="Click to rename"
              style={{margin:0,fontSize:18,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:textMain,cursor:"text",letterSpacing:.3}}>
              {matrixName}
            </h1>
          )}
          <div style={{fontSize:11,color:textDim,marginTop:4,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
            <span>{categorizedTechs}/{totalTechs} categorized</span>
            <span style={{opacity:.4}}>·</span>
            <span>{matrix.tactics.length} phases</span>
            <span style={{opacity:.4}}>·</span>
            <span style={{display:"flex",alignItems:"center",gap:4,color:linkedTechs>0?(dark?"#63b3ed":"#2b6cb0"):textDim}}>
              <LinkIcon color={linkedTechs>0?(dark?"#63b3ed":"#2b6cb0"):textDim} size={10}/>
              {linkedPhases} phase · {linkedTechs} action links
            </span>
            {activePb&&(
              <span style={{display:"flex",alignItems:"center",gap:5,color:activePb.color,background:`${activePb.color}18`,border:`1px solid ${activePb.color}44`,borderRadius:12,padding:"1px 9px"}}>
                {pbMode==="edit"
                  ?<><div className="rec-dot" style={{width:5,height:5,borderRadius:"50%",background:activePb.color}}/> Editing: {activePb.name}</>
                  :<><EyeIcon color={activePb.color} size={10}/> Viewing: {activePb.name}</>
                }
              </span>
            )}
            {catCounts.map(c=>(
              <span key={c.id} style={{color:c.text,display:"flex",alignItems:"center",gap:3}}>
                <span style={{opacity:.3}}>·</span>{c.count} {c.label}
              </span>
            ))}
          </div>
        </div>

        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {/* Theme toggle */}
          {(()=>{
            const themes = ["dark","light","tactical","midnight"];
            const labels = {dark:"Dark",light:"Light",tactical:"Tactical",midnight:"Midnight"};
            const nextTheme = themes[(themes.indexOf(theme)+1)%themes.length];
            return (
              <button className="theme-toggle" onClick={()=>setTheme(nextTheme)}
                title={`Theme: ${labels[theme]} → ${labels[nextTheme]}`}
                style={{background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:7,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:5,padding:"0 10px"}}>
                {dark ? <SunIcon color={theme==="tactical"?"#FCCC44":"#f6ad55"} size={15}/> : <MoonIcon color="#5b4fd4" size={15}/>}
                <span style={{fontSize:10,color:dark?"#888":"#666",letterSpacing:.5}}>{labels[theme]}</span>
              </button>
            );
          })()}
          {[
            {label:"+ Phase",        fn:()=>setShowAddTactic(true)},
            {label:"+ Action",       fn:()=>setShowAddAction(true)},
            {label:"Clear All",      fn:clearAll},
            {label:"Import JSON",    fn:()=>fileRef.current.click()},
            {label:"Export JSON ↓",  fn:exportSnapshot, hi:true},
          ].map(btn=>(
            <button key={btn.label} className="tool-btn" onClick={btn.fn} style={{
              background:btn.hi?(dark?"#1a1040":"#ede9fe"):(dark?"#0e0e20":"#f5f5fc"),
              color:btn.hi?(dark?"#a29bfe":"#5b4fd4"):(dark?"#888":"#6060a0"),
              border:`1px solid ${btn.hi?(dark?"#6c5ce7":"#a78bfa"):(dark?"#252545":"#d0d0e8")}`,
              borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:11,letterSpacing:.5,fontFamily:"inherit",
            }}>{btn.label}</button>
          ))}
        </div>
      </header>

      {/* ── CATEGORY FILTER BAR ── */}
      <div style={{background:barBg,borderBottom:`1px solid ${border}`,padding:"7px 22px",display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",flexShrink:0}}>
        <span style={{fontSize:10,color:textDim,letterSpacing:2,marginRight:4}}>CATEGORY:</span>
        {categories.map(cat=>{
          const on = filterCat===cat.id;
          const isCustom = !DEFAULT_CATEGORIES.find(d=>d.id===cat.id);
          return (
            <div key={cat.id} className="cat-pill-wrap" style={{display:"flex",alignItems:"center",position:"relative",opacity:filterCat&&!on?.4:1}}>
              <button onClick={()=>setFilterCat(on?"":cat.id)}
                style={{display:"flex",alignItems:"center",gap:5,background:on?cat.bg:"transparent",border:`1px solid ${on?cat.color:dark?"#2a2a48":"#d0d0e8"}`,borderRadius:20,padding:isCustom?"3px 22px 3px 10px":"3px 10px",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:on?cat.text:dark?"#4a4a70":"#b0b0cc",flexShrink:0}}/>
                <span style={{fontSize:11,color:on?cat.text:textSub}}>{cat.label}</span>
              </button>
              {isCustom&&(
                <button onClick={e=>{e.stopPropagation();deleteCategory(cat.id);}}
                  onMouseEnter={e=>e.currentTarget.style.color="#e94560"}
                  onMouseLeave={e=>e.currentTarget.style.color="#e9456055"}
                  style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#e9456055",cursor:"pointer",fontSize:12,lineHeight:1,padding:0,transition:"color .15s"}} title="Delete">×</button>
              )}
            </div>
          );
        })}
        {/* Manage categories button */}
        <button onClick={()=>setShowManageCat(true)}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="#7c6ff7";e.currentTarget.style.color=dark?"#a29bfe":"#5b4fd4";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=dark?"#2a2a48":"#d0d0e8";e.currentTarget.style.color=textSub;}}
          style={{display:"flex",alignItems:"center",gap:4,background:"transparent",border:`1px dashed ${dark?"#2a2a48":"#d0d0e8"}`,borderRadius:20,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit",color:textSub,fontSize:11,transition:"all .15s"}}>
          <TagIcon color="currentColor" size={10}/>
          Manage
        </button>
      </div>

      {/* ── HINT BAR ── */}
      <div style={{background:hintBg,borderBottom:`1px solid ${border}`,padding:"5px 22px",display:"flex",gap:20,alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",flexShrink:0}}>
        <span style={{fontSize:10,color:textDim,display:"flex",alignItems:"center",gap:5}}>
          {activePb&&pbMode==="view"&&<><EyeIcon color={activePb.color+"aa"} size={9}/><span style={{color:activePb.color+"bb"}}>View — highlighted actions open their link on click</span></>}
          {activePb&&pbMode==="edit"&&<><div className="rec-dot" style={{width:5,height:5,borderRadius:"50%",background:activePb.color,flexShrink:0}}/><span style={{color:activePb.color+"bb"}}>Edit — click any action to add/remove from <strong style={{color:activePb.color}}>{activePb.name}</strong></span></>}
          {!activePb&&<><LinkIcon color={textDim} size={9}/> Phase/action with link → opens URL · No link → click to edit</>}
        </span>
        <span style={{fontSize:10,color:textDim}}>Export → <span style={{color:dark?"#5555aa":"#8888cc"}}>index_YYYYMMDD_HHMMSS.html</span></span>
      </div>

      {/* ── BODY ── */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* MATRIX */}
        <div style={{flex:1,overflowX:"auto",overflowY:"auto",padding:"20px 18px 48px"}}>
          <div style={{display:"flex",gap:12,minWidth:"max-content",alignItems:"flex-start"}}>

            {matrix.tactics.map((tactic,idx)=>{
              const accent = TACTIC_ACCENTS[tactic.id]||DEF_ACCENT;
              const techs  = filterCat ? tactic.techniques.filter(te=>te.category===filterCat) : tactic.techniques;

              return (
                <div key={tactic.id} className="tactic-wrap" style={{width:175,flexShrink:0}}>

                  {/* Phase header */}
                  <div className="tactic-header"
                    onClick={()=>handleTacticClick(tactic)}
                    onMouseEnter={()=>setHoveredTactic(tactic.id)}
                    onMouseLeave={()=>setHoveredTactic(null)}
                    style={{background:`linear-gradient(150deg,${accent.from},${accent.to})`,borderRadius:10,padding:"12px 14px",marginBottom:8,border:`1px solid ${tactic.url?accent.text+"66":accent.border}`,position:"relative",boxShadow:dark?(tactic.url?`0 4px 24px ${accent.text}22`:`0 4px 18px ${accent.border}22`):(tactic.url?`0 4px 16px ${accent.text}33`:`0 2px 8px ${accent.border}22`)}}>
                    <div style={{fontSize:9,color:accent.text,opacity:.6,letterSpacing:3,marginBottom:4,textTransform:"uppercase"}}>Phase {idx+1}</div>
                    <div style={{fontSize:13,fontWeight:700,color:accent.text,fontFamily:"'Space Grotesk',sans-serif",lineHeight:1.25,paddingRight:18}}>{tactic.name}</div>
                    <div style={{fontSize:10,color:dark?"#44446088":"#88889088",marginTop:4,display:"flex",alignItems:"center",gap:5}}>
                      <span>{filterCat?`${techs.length}/${tactic.techniques.length}`:tactic.techniques.length} actions</span>
                      {tactic.url&&<span style={{display:"flex",alignItems:"center",gap:3,color:accent.text,opacity:.6}}>· <LinkIcon color={accent.text} size={9}/></span>}
                    </div>
                    {hoveredTactic===tactic.id&&!tactic.url&&!activePb&&(
                      <div style={{position:"absolute",top:9,right:28,fontSize:11,color:accent.text,opacity:.5}}>✎</div>
                    )}
                    <button className="tactic-del" onClick={e=>{e.stopPropagation();deleteTactic(tactic.id);}} style={{position:"absolute",top:9,right:9,background:"transparent",border:"none",color:"#e94560",cursor:"pointer",fontSize:16,padding:2,lineHeight:1}}>×</button>
                  </div>

                  {/* Action cells */}
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {techs.map(tech=>{
                      const cat       = getCat(tech.category);
                      const isHov     = hoveredCell===`${tactic.id}-${tech.id}`;
                      const hasLink   = !!tech.url;
                      const inPb      = activePb&&activePb.techIds.includes(tech.id);
                      const isDimmed  = activePb&&!inPb;
                      const memberPbs = (matrix.playbooks||[]).filter(p=>p.id!==activePlaybook&&p.techIds.includes(tech.id));

                      let cls="tech-cell";
                      if(isDimmed)                    cls+=" dimmed";
                      if(isDimmed&&pbMode==="view")   cls+=" view-mode-dim";
                      if(inPb)                        cls+=" in-playbook";
                      if(inPb&&pbMode==="view")       cls+=" view-mode";
                      if(pbMode==="edit")             cls+=" edit-mode-cell";

                      const catBg = tech.category ? cat.bg : cellBg;
                      const catBorder = inPb
                        ? activePb.color+"cc"
                        : hasLink
                          ? (tech.category?cat.color+"aa":(dark?"#4a4a80":"#b0b0d8"))
                          : (tech.category?cat.color:cellBorderBase);

                      return (
                        <div key={tech.id} className={cls}
                          style={{
                            "--pb-color": activePb?.color||"#7c6ff7",
                            background: catBg,
                            border: `1px solid ${catBorder}`,
                            borderRadius:8, padding:"9px 11px",
                            cursor: pbMode==="edit"?"crosshair":(hasLink||inPb)?"pointer":"default",
                            position:"relative",
                            boxShadow: inPb
                              ? `0 0 14px ${activePb.color}44`
                              : hasLink
                                ? `0 2px 10px ${tech.category?cat.color+"33":(dark?"#3a3a7033":"#b0b0d033")}`
                                : tech.category
                                  ? `0 1px 6px ${cat.color}22`
                                  : dark?"none":"0 1px 3px rgba(0,0,0,.06)",
                          }}
                          onClick={()=>handleTechClick(tactic.id,tech)}
                          onMouseEnter={()=>{ if(!isDimmed||pbMode==="edit") setHoveredCell(`${tactic.id}-${tech.id}`); }}
                          onMouseLeave={()=>setHoveredCell(null)}
                        >
                          {/* ID row */}
                          <div style={{fontSize:9,color:dark?"#3a3a58":"#c0c0d8",marginBottom:3,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span>{tech.id}</span>
                            <div style={{display:"flex",alignItems:"center",gap:3}}>
                              {memberPbs.map(p=><div key={p.id} style={{width:5,height:5,borderRadius:"50%",background:p.color}} title={p.name}/>)}
                              {hasLink&&!activePb&&<LinkIcon color={tech.category?cat.text:(dark?"#5a5a90":"#b0b0d0")} size={9}/>}
                              {inPb&&pbMode==="view"&&hasLink&&<LinkIcon color={activePb.color} size={9}/>}
                            </div>
                          </div>
                          {/* Name */}
                          <div style={{fontSize:12,fontWeight:500,color:inPb?textMain:(tech.category?cat.text:(hasLink?(dark?"#b0b0d8":"#4040a0"):(dark?"#9090b8":"#5050a0"))),lineHeight:1.35}}>
                            {tech.name}
                          </div>
                          {/* Category badge */}
                          {tech.category&&(
                            <div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,background:`${cat.color}20`,border:`1px solid ${cat.color}55`,borderRadius:10,padding:"2px 7px"}}>
                              <div style={{width:5,height:5,borderRadius:"50%",background:cat.text}}/>
                              <span style={{fontSize:9,color:cat.text,letterSpacing:.5}}>{cat.label}</span>
                            </div>
                          )}
                          {/* Collapsible detail sections */}
                          {!inPb&&!activePb&&(tech.sections?.length>0||(tech.comment&&!tech.sections))&&(
                            <div style={{marginTop:6}} onClick={e=>e.stopPropagation()}>
                              {(tech.sections?.length>0?tech.sections:[{id:"legacy",title:"Notes",body:tech.comment}]).map(sec=>(
                                <SectionBlock key={sec.id} sec={sec} dark={dark}/>
                              ))}
                            </div>
                          )}
                          {/* In-playbook checkmark */}
                          {inPb&&(
                            <div style={{position:"absolute",top:6,right:6,width:15,height:15,borderRadius:"50%",background:activePb.color,display:"flex",alignItems:"center",justifyContent:"center"}}>
                              <span style={{color:"#fff",fontSize:9,fontWeight:700,lineHeight:1}}>✓</span>
                            </div>
                          )}
                          {/* Sections indicator dots — removed by design */}
                          {/* Edit/del */}
                          {isHov&&!activePb&&(
                            <div style={{position:"absolute",bottom:5,right:5,display:"flex",gap:4}}>
                              <button onClick={e=>{e.stopPropagation();setSelected({tacticId:tactic.id,techId:tech.id});}}
                                style={{background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:4,color:dark?"#a29bfe":"#5b4fd4",fontSize:9,padding:"1px 6px",cursor:"pointer",fontFamily:"inherit"}}>edit</button>
                              <button onClick={e=>{e.stopPropagation();deleteTech(tactic.id,tech.id);}}
                                style={{background:dark?"#e9456012":"#fff0f2",border:`1px solid ${dark?"#e9456045":"#fca5a5"}`,borderRadius:4,color:"#e94560",fontSize:9,padding:"1px 5px",cursor:"pointer",fontFamily:"inherit"}}>del</button>
                            </div>
                          )}
                        </div>
                      );
                    })}

                    {filterCat&&techs.length===0&&(
                      <div style={{border:`1px dashed ${dark?"#1e1e38":"#d8d8f0"}`,borderRadius:8,padding:"16px 10px",textAlign:"center",color:textDim,fontSize:11}}>no match</div>
                    )}

                    {!activePb&&(
                      <button className="add-action-btn"
                        onClick={()=>setShowAddAction({preselect:tactic.id})}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor=accent.text;e.currentTarget.style.color=accent.text;}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor=dark?"#1e1e38":"#d8d8f0";e.currentTarget.style.color=textDim;}}
                        style={{background:"transparent",border:`1px dashed ${dark?"#1e1e38":"#d8d8f0"}`,borderRadius:8,padding:"8px",color:textDim,cursor:"pointer",fontSize:11,fontFamily:"inherit",transition:"all .15s"}}>
                        + add action
                      </button>
                    )}
                  </div>
                </div>
              );
            })}

            {/* Add Phase */}
            {!activePb&&(
              <div style={{width:140,flexShrink:0}}>
                <button onClick={()=>setShowAddTactic(true)}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="#7c6ff7";e.currentTarget.style.color="#7c6ff7";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=dark?"#1a1a30":"#d8d8f0";e.currentTarget.style.color=textDim;}}
                  style={{width:"100%",background:"transparent",border:`2px dashed ${dark?"#1a1a30":"#d8d8f0"}`,borderRadius:10,padding:"40px 10px",color:textDim,cursor:"pointer",fontSize:12,transition:"all .2s",fontFamily:"inherit"}}>
                  + New Phase
                </button>
              </div>
            )}
          </div>
        </div>

        {/* ── PLAYBOOK PANEL ── */}
        {panelOpen ? (
          <PlaybookPanel
            dark={dark}
            playbooks={matrix.playbooks||[]}
            activePlaybookId={activePlaybook}
            pbMode={pbMode}
            onSelect={selectPlaybook}
            onSetMode={setPbMode}
            onDeselect={deselectPlaybook}
            onAdd={()=>setShowAddPb(true)}
            onDelete={deletePlaybook}
            onRename={renamePlaybook}
            onUpdateDesc={updatePlaybookDesc}
            onReorder={reorderPlaybook}
            onCollapse={()=>setPanelOpen(false)}
            onOpenGuide={(pbId)=>setShowGuide(pbId)}
            matrix={matrix}
          />
        ) : (
          <div onClick={()=>setPanelOpen(true)} title="Open use cases panel"
            style={{width:32,flexShrink:0,background:dark?"#0e0e1e":"#f8f8ff",borderLeft:`1px solid ${dark?"#1e1e38":"#d8d8f0"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:10,transition:"background .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background=dark?"#141430":"#eeeefc"}
            onMouseLeave={e=>e.currentTarget.style.background=dark?"#0e0e1e":"#f8f8ff"}>
            <BookIcon color="#7c6ff7" size={14}/>
            <span style={{fontSize:10,color:"#7c6ff7",letterSpacing:2,textTransform:"uppercase",writingMode:"vertical-rl",transform:"rotate(180deg)",opacity:.8,whiteSpace:"nowrap"}}>Use Cases</span>
            {(matrix.playbooks||[]).length>0&&(
              <span style={{fontSize:9,color:"#a29bfe",background:dark?"#1a1a3a":"#ede9fe",border:`1px solid ${dark?"#3a3a6a":"#c4b5fd"}`,borderRadius:8,padding:"2px 5px",textAlign:"center"}}>
                {(matrix.playbooks||[]).length}
              </span>
            )}
            <div style={{marginTop:"auto",marginBottom:14,opacity:.4}}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#a29bfe" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </div>
          </div>
        )}
      </div>

      {/* ── MODALS ── */}
      {/* Response Guide Overlay */}
      {showGuide&&(()=>{
        const guidePb=(matrix.playbooks||[]).find(p=>p.id===showGuide);
        return guidePb ? <ResponseGuideOverlay dark={dark} playbook={guidePb} matrix={matrix} onClose={()=>setShowGuide(null)}/> : null;
      })()}

      {selected&&selectedTech&&(
        <CellModal dark={dark} tech={selectedTech} categories={categories} onClose={()=>setSelected(null)} onSave={u=>{updateTech(selected.tacticId,selected.techId,u);setSelected(null);}}/>
      )}
      {editTactic&&(
        <TacticEditModal dark={dark} tactic={editTactic} onClose={()=>setEditTactic(null)} onSave={u=>{updateTactic(editTactic.id,u);setEditTactic(null);}}/>
      )}
      {showAddTactic&&<AddTacticModal dark={dark} onClose={()=>setShowAddTactic(false)} onAdd={addTactic}/>}
      {showAddAction&&<AddActionModal dark={dark} tactics={matrix.tactics} preselect={showAddAction?.preselect} onClose={()=>setShowAddAction(false)} onAdd={addAction}/>}
      {showAddPb&&<AddPlaybookModal dark={dark} onClose={()=>setShowAddPb(false)} onAdd={addPlaybook} usedColors={(matrix.playbooks||[]).map(p=>p.color)}/>}
      {showManageCat&&<ManageCategoriesModal dark={dark} categories={categories} onClose={()=>setShowManageCat(false)} onAdd={addCategory} onDelete={deleteCategory}/>}

      <input ref={fileRef} type="file" accept=".html" style={{display:"none"}} onChange={importFile}/>
    </div>
  );
}

// ── Load all data from the GitHub folder structure then boot the app ──
async function loadData() {
  const root = document.getElementById("root");

  // Show a loading state
  root.innerHTML = '<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#0e0e18;font-family:DM Mono,monospace;color:#444460;font-size:13px;letter-spacing:1px;">Loading IR Navigator…</div>';

  try {
    // Derive base URL robustly — works whether the page is at /repo/ or /repo/index.html
    const base = (() => {
      const loc = window.location.href;
      // Strip query string and hash
      const clean = loc.split('?')[0].split('#')[0];
      // If URL ends with .html, remove the filename; otherwise remove trailing slash
      return clean.endsWith('.html')
        ? clean.substring(0, clean.lastIndexOf('/'))
        : clean.replace(/\/$/, '');
    })();
    const get = path => fetch(`${base}/${path}`).then(r => {
      if(!r.ok) throw new Error(`Could not load "${path}" — HTTP ${r.status}. Check that the file exists in your GitHub repo at that path.`);
      return r.json();
    });

    // Step 1: fetch the master index
    const index = await get('index.json');

    // Step 2: fetch categories, playbooks, and phase metadata — all in parallel
    const [categories, ...playbooksAndPhases] = await Promise.all([
      get(index.categories),
      ...index.playbooks.map(p => get(p)),
      ...index.phases.map(folder => get(folder + '/_phase.json')),
    ]);

    const playbooks = playbooksAndPhases.slice(0, index.playbooks.length);
    const phaseMetas = playbooksAndPhases.slice(index.playbooks.length);

    // Step 3: for each phase, fetch all its action files in parallel
    const tactics = await Promise.all(
      phaseMetas.map(async (phase, i) => {
        const folder = index.phases[i];
        const actions = await Promise.all(
          phase.actions.map(filename => get(folder + '/' + filename))
        );
        return {
          id:        phase.id,
          name:      phase.name,
          shortcode: phase.shortcode,
          url:       phase.url || "",
          techniques: actions,
        };
      })
    );

    // Step 4: assemble the full matrix and render
    const matrix = {
      name:       index.name,
      categories: categories,
      playbooks:  playbooks,
      tactics:    tactics,
    };

    ReactDOM.createRoot(root).render(
      <App initialMatrix={matrix} initialName={index.name}/>
    );

  } catch(err) {
    const msg = err.message || String(err);
    root.innerHTML = `<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0e0e18;font-family:DM Mono,monospace;gap:10px;padding:40px;text-align:center;">
      <div style="color:#e94560;font-size:15px;font-weight:600;">Failed to load IR Navigator</div>
      <div style="color:#888;font-size:12px;max-width:560px;">${msg}</div>
      <div style="color:#555;font-size:10px;margin-top:6px;">Page URL: ${window.location.href}</div>
      <div style="color:#555;font-size:10px;">Check the browser console (F12) for more detail.</div>
    </div>`;
    console.error('IR Navigator load error:', err);
  }
}

loadData();
</script>
</body>
